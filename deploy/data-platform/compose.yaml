name: goodbase-data-platform

services:
  postgrest:
    image: postgrest/postgrest:v14.12
    container_name: goodbase-postgrest
    restart: unless-stopped
    init: true
    network_mode: host
    environment:
      PGRST_DB_URI: ${PGRST_DB_URI:?PGRST_DB_URI is required}
      PGRST_DB_SCHEMAS: goodos_api
      PGRST_DB_EXTRA_SEARCH_PATH: goodos_auth,public
      PGRST_DB_ANON_ROLE: goodos_anon
      PGRST_DB_PRE_REQUEST: goodos_auth.check_session
      PGRST_DB_CHANNEL_ENABLED: "true"
      PGRST_DB_CHANNEL: pgrst
      PGRST_JWT_SECRET: ${GOODOS_JWT_SECRET:?GOODOS_JWT_SECRET is required}
      PGRST_JWT_AUD: goodbase-rest
      PGRST_JWT_CACHE_MAX_ENTRIES: "1000"
      PGRST_DB_POOL: ${PGRST_DB_POOL:-20}
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: ${PGRST_DB_POOL_ACQUISITION_TIMEOUT:-10}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_SERVER_HOST: 127.0.0.1
      PGRST_SERVER_PORT: "8300"
      PGRST_ADMIN_SERVER_PORT: "8301"
      PGRST_SERVER_TIMING_ENABLED: "true"
      PGRST_LOG_LEVEL: ${PGRST_LOG_LEVEL:-info}
      PGRST_OPENAPI_MODE: follow-privileges
      PGRST_OPENAPI_SERVER_PROXY_URI: https://base.goodos.app/rest/v1
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 2.0
    pids_limit: 128
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    healthcheck:
      test: ["CMD", "postgrest", "--ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  pgbouncer-transaction:
    image: edoburu/pgbouncer:v1.25.2-p0
    container_name: goodbase-pgbouncer-transaction
    restart: unless-stopped
    init: true
    ports:
      - "6543:5432"
    environment:
      DB_HOST: /var/run/postgresql
      DB_PORT: "5432"
      DB_NAME: ${GOODBASE_DB_NAME:-goodos_backend}
      DB_USER: goodbase_pool_transaction
      DB_PASSWORD: ${GOODBASE_TRANSACTION_POOL_PASSWORD:?GOODBASE_TRANSACTION_POOL_PASSWORD is required}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: ${GOODBASE_TRANSACTION_MAX_CLIENTS:-200}
      DEFAULT_POOL_SIZE: ${GOODBASE_TRANSACTION_POOL_SIZE:-20}
      RESERVE_POOL_SIZE: ${GOODBASE_TRANSACTION_RESERVE_SIZE:-5}
      RESERVE_POOL_TIMEOUT: "5"
      QUERY_TIMEOUT: "60"
      IDLE_TRANSACTION_TIMEOUT: "60"
      MAX_PREPARED_STATEMENTS: "200"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
      CLIENT_TLS_SSLMODE: require
      CLIENT_TLS_CERT_FILE: /tls/fullchain.pem
      CLIENT_TLS_KEY_FILE: /tls/privkey.pem
      SERVER_TLS_SSLMODE: disable
    volumes:
      - /etc/goodbase/pgbouncer-tls:/tls:ro
      - /var/run/postgresql:/var/run/postgresql
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /etc/pgbouncer:size=4m,mode=0777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 1.0
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  pgbouncer-session:
    image: edoburu/pgbouncer:v1.25.2-p0
    container_name: goodbase-pgbouncer-session
    restart: unless-stopped
    init: true
    ports:
      - "5433:5432"
    environment:
      DB_HOST: /var/run/postgresql
      DB_PORT: "5432"
      DB_NAME: ${GOODBASE_DB_NAME:-goodos_backend}
      DB_USER: goodbase_pool_session
      DB_PASSWORD: ${GOODBASE_SESSION_POOL_PASSWORD:?GOODBASE_SESSION_POOL_PASSWORD is required}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: session
      MAX_CLIENT_CONN: ${GOODBASE_SESSION_MAX_CLIENTS:-100}
      DEFAULT_POOL_SIZE: ${GOODBASE_SESSION_POOL_SIZE:-10}
      RESERVE_POOL_SIZE: ${GOODBASE_SESSION_RESERVE_SIZE:-2}
      RESERVE_POOL_TIMEOUT: "5"
      QUERY_TIMEOUT: "300"
      IDLE_TRANSACTION_TIMEOUT: "300"
      CLIENT_TLS_SSLMODE: require
      CLIENT_TLS_CERT_FILE: /tls/fullchain.pem
      CLIENT_TLS_KEY_FILE: /tls/privkey.pem
      SERVER_TLS_SSLMODE: disable
    volumes:
      - /etc/goodbase/pgbouncer-tls:/tls:ro
      - /var/run/postgresql:/var/run/postgresql
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /etc/pgbouncer:size=4m,mode=0777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 1.0
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  realtime:
    image: supabase/realtime:v2.112.9
    container_name: goodbase-realtime-cdc
    restart: unless-stopped
    init: true
    network_mode: host
    environment:
      PORT: "8400"
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: ${REALTIME_DB_NAME:-goodos_backend}
      DB_USER: ${REALTIME_DB_USER:?REALTIME_DB_USER is required}
      DB_PASSWORD: ${REALTIME_DB_PASSWORD:?REALTIME_DB_PASSWORD is required}
      DB_SSL: "false"
      DB_ENC_KEY: ${REALTIME_DB_ENC_KEY:?REALTIME_DB_ENC_KEY is required}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      API_JWT_SECRET: ${REALTIME_API_JWT_SECRET:?REALTIME_API_JWT_SECRET is required}
      METRICS_JWT_SECRET: ${REALTIME_API_JWT_SECRET:?REALTIME_API_JWT_SECRET is required}
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:?REALTIME_SECRET_KEY_BASE is required}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: goodbase_realtime
      SEED_SELF_HOST: "true"
      SELF_HOST_TENANT_NAME: base
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
      MAX_CONNECTIONS: ${REALTIME_MAX_CONNECTIONS:-10000}
      NUM_ACCEPTORS: ${REALTIME_NUM_ACCEPTORS:-100}
      JWT_CLAIM_VALIDATORS: ${REALTIME_JWT_CLAIM_VALIDATORS:-'{"iss":"https://base.goodos.app"}'}
    mem_limit: 1g
    cpus: 2.0
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  edge-runtime:
    image: denoland/deno:2.8.1
    container_name: goodbase-edge-runtime
    network_mode: host
    user: deno
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 1g
    cpus: "2.0"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m,mode=1777
    volumes:
      - ../../src/edge-runtime/server.ts:/runtime/server.ts:ro
      - /var/lib/goodbase/functions:/functions:ro
    environment:
      GOODBASE_EDGE_PORT: "8500"
      DENO_NO_UPDATE_CHECK: "1"
      NO_COLOR: "1"
    command:
      - run
      - --quiet
      - --no-prompt
      - --no-config
      - --no-lock
      - --allow-net=0.0.0.0:8500,127.0.0.1:8500
      - --allow-read=/functions
      - --allow-run=deno
      - --allow-env=GOODBASE_EDGE_PORT
      - /runtime/server.ts
    healthcheck:
      test: ["CMD", "deno", "eval", "fetch('http://127.0.0.1:8500/health').then(r=>{if(!r.ok)Deno.exit(1)})"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    restart: unless-stopped
