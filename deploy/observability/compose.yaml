name: goodbase-observability

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks: [observability]
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "3"
  security_opt:
    - no-new-privileges:true

services:
  otel-collector:
    <<: *service-defaults
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    user: "0:0"
    volumes:
      - ./config/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /root/.pm2/logs:/var/log/goodbase/pm2:ro
      - /var/log/nginx:/var/log/goodbase/nginx:ro
      - /var/log/postgresql:/var/log/goodbase/postgresql:ro
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
      - /:/hostfs:ro
      - otel-state:/var/lib/otelcol
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      loki: { condition: service_started }
      tempo: { condition: service_started }
    mem_limit: 512m
    cpus: 0.60
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otelcol-contrib/config.yaml"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v3.11.3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=8GB
      - --web.enable-lifecycle
      - --web.external-url=http://prometheus:9090
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      otel-collector: { condition: service_started }
      alertmanager: { condition: service_healthy }
      blackbox: { condition: service_healthy }
    mem_limit: 1024m
    cpus: 0.80
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  loki:
    <<: *service-defaults
    image: grafana/loki:3.7.2
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    mem_limit: 768m
    cpus: 0.60

  tempo:
    <<: *service-defaults
    image: grafana/tempo:2.10.5
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    mem_limit: 768m
    cpus: 0.60

  alertmanager:
    <<: *service-defaults
    image: prom/alertmanager:v0.32.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --data.retention=120h
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    mem_limit: 192m
    cpus: 0.20
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9093/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  blackbox:
    <<: *service-defaults
    image: prom/blackbox-exporter:v0.28.0
    command: ["--config.file=/etc/blackbox/config.yml"]
    volumes:
      - ./config/blackbox/blackbox.yml:/etc/blackbox/config.yml:ro
    mem_limit: 128m
    cpus: 0.15
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9115/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10

  grafana:
    <<: *service-defaults
    image: grafana/grafana:13.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-goodbase-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://base.goodos.app/observability/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_CONTENT_SECURITY_POLICY: "true"
      GF_METRICS_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_LOG_MODE: console
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3300:3000"
    depends_on:
      prometheus: { condition: service_healthy }
      loki: { condition: service_started }
      tempo: { condition: service_started }
    mem_limit: 512m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

networks:
  observability:
    driver: bridge
    internal: false

volumes:
  otel-state:
  prometheus-data:
  loki-data:
  tempo-data:
  alertmanager-data:
  grafana-data:
