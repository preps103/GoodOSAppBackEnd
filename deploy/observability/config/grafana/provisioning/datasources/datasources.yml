apiVersion: 1

datasources:
  - name: Prometheus
    uid: goodbase-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: goodbase-tempo
  - name: Loki
    uid: goodbase-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceId":"([a-f0-9]{32})"'
          datasourceUid: goodbase-tempo
          url: '$${__value.raw}'
  - name: Tempo
    uid: goodbase-tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: goodbase-loki
        spanStartTimeShift: -2m
        spanEndTimeShift: 2m
        filterByTraceID: true
        filterBySpanID: false
      serviceMap:
        datasourceUid: goodbase-prometheus
      nodeGraph:
        enabled: true
