modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: ip4
      fail_if_not_ssl: true
      follow_redirects: true
  dns_goodos:
    prober: dns
    timeout: 5s
    dns:
      query_name: goodos.app
      query_type: SOA
      preferred_ip_protocol: ip4
