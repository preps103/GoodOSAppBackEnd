global:
  resolve_timeout: 5m

route:
  receiver: goodbase-console
  group_by: [alertname, severity, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: goodbase-console
    webhook_configs:
      - url: http://alert-relay:8080/v1/alerts
        send_resolved: true
        max_alerts: 100

inhibit_rules:
  - source_matchers: ['severity="critical"']
    target_matchers: ['severity="warning"']
    equal: [alertname, instance]
