name: goodspeech-inference

services:
  kokoro-tts:
    build:
      context: ../../services/kokoro-tts
    image: goodos/kokoro-tts:0.9.4
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8880:8880"
    environment:
      KOKORO_TTS_TOKEN: ${KOKORO_TTS_TOKEN:?KOKORO_TTS_TOKEN is required}
      KOKORO_CONCURRENCY: ${KOKORO_CONCURRENCY:-1}
      HF_HOME: /var/lib/kokoro/models
    volumes:
      - kokoro_models:/var/lib/kokoro/models
    tmpfs:
      - /tmp:size=256m,mode=1777
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8880/health/ready', timeout=4)"
      interval: 30s
      timeout: 5s
      start_period: 180s
      retries: 5

volumes:
  kokoro_models:
