name: Goodbase Required CI

on:
  pull_request:
  push:
    branches:
      - main
      - "phase14/**"

permissions:
  contents: read
  security-events: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check:syntax

      - name: Validate OpenAPI contract
        run: npm run check:openapi

      - name: Run automated tests
        run: npm test 2>&1 | tee goodbase-tests.tap

      - name: Run security gate
        env:
          GOODBASE_RELEASE_COMMIT: ${{ github.sha }}
          GOODBASE_EVIDENCE_DIR: artifacts/release-evidence
        run: npm run security:gate | tee goodbase-security.json

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Generate SBOM
        run: mkdir -p artifacts/release-evidence && npm sbom --sbom-format cyclonedx > artifacts/release-evidence/goodbase-sbom.cdx.json

      - name: Publish required-check evidence
        uses: actions/upload-artifact@v4
        with:
          name: goodbase-required-ci-${{ github.sha }}
          path: |
            goodbase-tests.tap
            goodbase-security.json
            artifacts/release-evidence/
          retention-days: 90
