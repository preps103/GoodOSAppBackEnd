name: Goodbase SDK Conformance
on:
  pull_request:
    paths: ["sdks/**", "test/goodbase-official-sdks.test.js", ".github/workflows/goodbase-sdk-conformance.yml"]
  push:
    branches: [main]
    tags: ["sdk-v*"]
permissions: {contents: read}
jobs:
  javascript-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "22"}
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: node --test test/goodbase-official-sdks.test.js
      - run: npm pack --dry-run
        working-directory: sdks/javascript
      - run: python -m compileall -q goodbase
        working-directory: sdks/python
      - run: python -m pip wheel --no-deps . -w dist
        working-directory: sdks/python
      - uses: actions/upload-artifact@v4
        with: {name: python-sdk, path: sdks/python/dist/*}
  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift test
        working-directory: sdks/swift
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: "17"}
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with: {gradle-version: "8.11.1"}
      - run: gradle :assembleRelease :testReleaseUnitTest
        working-directory: sdks/kotlin
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: stable}
      - run: flutter analyze
        working-directory: sdks/dart
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: {dotnet-version: "8.0.x"}
      - run: dotnet build -c Release
        working-directory: sdks/csharp/Goodbase
