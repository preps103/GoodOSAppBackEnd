name: Goodbase SDK Conformance
on:
  pull_request:
    paths: ["sdks/**", "scripts/goodbase-record-ci.js", "test/goodbase-official-sdks.test.js", "test/goodbase-operational-proof.test.js", ".github/workflows/goodbase-sdk-conformance.yml"]
  push:
    branches: [main]
    tags: ["sdk-v*"]
permissions: {contents: read}
concurrency:
  group: goodbase-sdk-conformance-${{ github.ref }}
  cancel-in-progress: true
jobs:
  javascript-python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: {node-version: "22"}
      - uses: actions/setup-python@v7
        with: {python-version: "3.12"}
      - run: node --test test/goodbase-official-sdks.test.js
      - run: npm pack
        working-directory: sdks/javascript
      - run: python -m compileall -q goodbase
        working-directory: sdks/python
      - run: python -m pip wheel --no-deps . -w dist
        working-directory: sdks/python
      - uses: actions/upload-artifact@v7
        with:
          name: goodbase-sdk-js-python-${{ github.sha }}
          path: |
            sdks/javascript/*.tgz
            sdks/python/dist/*
          retention-days: 90
  swift:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - run: swift test
        working-directory: sdks/swift
      - run: |
          swift package dump-package > goodbase-swift-package.json
          tar -czf goodbase-swift-sdk.tar.gz Package.swift Sources Tests
        working-directory: sdks/swift
      - uses: actions/upload-artifact@v7
        with:
          name: goodbase-sdk-swift-${{ github.sha }}
          path: |
            sdks/swift/goodbase-swift-package.json
            sdks/swift/goodbase-swift-sdk.tar.gz
          retention-days: 90
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with: {distribution: temurin, java-version: "17"}
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with: {gradle-version: "8.11.1"}
      - run: gradle :assembleRelease :testReleaseUnitTest
        working-directory: sdks/kotlin
      - uses: actions/upload-artifact@v7
        with:
          name: goodbase-sdk-android-${{ github.sha }}
          path: |
            sdks/kotlin/build/outputs/aar/*.aar
            sdks/kotlin/build/intermediates/cxx/RelWithDebInfo/**/obj/**/*.so
          retention-days: 90
  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with: {channel: stable}
      - run: flutter analyze
        working-directory: sdks/dart
      - run: dart pub publish --dry-run
        working-directory: sdks/dart
      - run: tar -czf goodbase-flutter-sdk.tar.gz --exclude=.dart_tool --exclude=build pubspec.yaml lib
        working-directory: sdks/dart
      - uses: actions/upload-artifact@v7
        with:
          name: goodbase-sdk-flutter-${{ github.sha }}
          path: sdks/dart/goodbase-flutter-sdk.tar.gz
          retention-days: 90
  dotnet:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with: {dotnet-version: "8.0.x"}
      - run: dotnet build -c Release
        working-directory: sdks/csharp/Goodbase
      - uses: actions/upload-artifact@v7
        with:
          name: goodbase-sdk-dotnet-${{ github.sha }}
          path: |
            sdks/csharp/Goodbase/bin/Release/*.nupkg
            sdks/csharp/Goodbase/bin/Release/*.snupkg
          retention-days: 90
  evidence:
    needs: [javascript-python, swift, android, flutter, dotnet]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: goodbase-sdk-*-${{ github.sha }}
          path: evidence
      - name: Build exact-commit SDK evidence manifest
        run: |
          find evidence -type f -print0 | sort -z | xargs -0 sha256sum > evidence/SHA256SUMS
          printf '%s\n' '${{ github.sha }}' > evidence/RELEASE_COMMIT
      - uses: actions/upload-artifact@v7
        with:
          name: goodbase-sdk-conformance-${{ github.sha }}
          path: evidence
          retention-days: 90
