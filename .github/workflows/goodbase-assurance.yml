name: Goodbase Assurance
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 7 * * *"
permissions:
  attestations: write
  contents: read
  security-events: write
  id-token: write
concurrency:
  group: goodbase-assurance-${{ github.ref }}
  cancel-in-progress: true
jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.3
          cache: npm
      - run: npm ci
      - run: mkdir -p artifacts/release-evidence
      - run: npm run check
      - run: npm run security:gate | tee artifacts/release-evidence/security-gate.json
        env:
          GOODBASE_RELEASE_COMMIT: ${{ github.sha }}
          GOODBASE_EVIDENCE_DIR: artifacts/release-evidence
      - run: npm audit --omit=dev --audit-level=high
      - run: npm sbom --sbom-format cyclonedx > artifacts/release-evidence/goodbase-sbom.cdx.json
      - id: package
        shell: bash
        run: |
          npm pack
          artifact="$(find . -maxdepth 1 -name '*.tgz' -print -quit)"
          test -n "$artifact"
          echo "path=$artifact" >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: ${{ steps.package.outputs.path }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goodbase-release-evidence
          retention-days: 90
          path: |
            artifacts/release-evidence/
            ${{ steps.package.outputs.path }}
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
  container-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"
