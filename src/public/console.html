<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GoodAppBackEnd Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #07080d;
      --panel: #10131b;
      --panel2: #151923;
      --border: rgba(255,255,255,.08);
      --muted: #8b90a0;
      --text: #f5f7fb;
      --green: #22c55e;
      --indigo: #7367ff;
      --cyan: #22d3ee;
      --red: #fb7185;
      --amber: #fbbf24;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 10%, rgba(115,103,255,.18), transparent 32%),
        radial-gradient(circle at 86% 4%, rgba(34,211,238,.08), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input { font: inherit; }

    .hidden { display: none !important; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(8,10,16,.82);
      padding: 22px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 10px 24px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--indigo), #4f46e5);
      box-shadow: 0 20px 50px rgba(115,103,255,.25);
      font-weight: 950;
    }

    .brand h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: -.04em;
    }

    .brand p {
      font-size: 12px;
      margin: 2px 0 0;
      color: var(--muted);
    }

    .nav-section { margin-top: 22px; }

    .nav-title {
      font-size: 10px;
      font-weight: 900;
      color: #626878;
      letter-spacing: .22em;
      text-transform: uppercase;
      padding: 0 10px;
      margin-bottom: 8px;
    }

    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: #a8adbd;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: .16s ease;
      font-weight: 800;
      font-size: 14px;
    }

    .nav button:hover,
    .nav button.active {
      background: rgba(115,103,255,.16);
      color: white;
    }

    main { min-width: 0; }

    .topbar {
      height: 72px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: rgba(7,8,13,.72);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .search {
      width: min(620px, 52vw);
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--muted);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: white;
    }

    .session {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      padding: 8px 12px;
      color: #c7cbda;
      font-size: 12px;
      font-weight: 900;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 8px;
      box-shadow: 0 0 20px rgba(34,197,94,.55);
    }

    .logout {
      border: 1px solid rgba(251,113,133,.25);
      background: rgba(251,113,133,.08);
      color: #fecdd3;
      padding: 9px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 950;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .content { padding: 32px; }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    .hero h2 {
      font-size: 34px;
      margin: 0;
      letter-spacing: -.05em;
    }

    .hero p {
      color: var(--muted);
      margin: 8px 0 0;
      max-width: 760px;
      line-height: 1.6;
      font-size: 15px;
    }

    .grid { display: grid; gap: 18px; }
    .cards { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .two { grid-template-columns: 1.25fr .75fr; margin-top: 18px; }
    .module-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card, .module {
      background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 24px 70px rgba(0,0,0,.18);
    }

    .card .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .16em;
    }

    .card .value {
      font-size: 32px;
      font-weight: 950;
      margin-top: 8px;
      letter-spacing: -.04em;
    }

    .card .sub {
      color: #737988;
      font-size: 12px;
      margin-top: 4px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .section-head h3 {
      margin: 0;
      font-size: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      color: #747b8c;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 10px;
      text-align: left;
      padding: 13px 12px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      color: #d7dae5;
      font-size: 13px;
      vertical-align: top;
    }

    tr:hover td { background: rgba(255,255,255,.025); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(34,197,94,.1);
      color: #86efac;
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .badge.next {
      background: rgba(34,211,238,.1);
      color: #67e8f9;
    }

    .badge.warn {
      background: rgba(251,191,36,.1);
      color: #fde68a;
    }

    .muted { color: var(--muted); }

    .module h4 {
      margin: 0 0 8px;
      font-size: 17px;
    }

    .module p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .module .tag {
      margin-top: 16px;
      color: var(--cyan);
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .14em;
    }

    .codebox {
      max-height: 440px;
      overflow: auto;
      background: rgba(0,0,0,.28);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #b8bdcc;
      white-space: pre-wrap;
    }

    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 28px 90px rgba(0,0,0,.42);
    }

    .login-card h1 {
      margin: 16px 0 0;
      font-size: 30px;
      letter-spacing: -.04em;
    }

    .login-card p {
      color: var(--muted);
      line-height: 1.6;
    }

    label {
      color: #9aa1b3;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-weight: 950;
      display: block;
      margin: 18px 0 8px;
    }

    .login input {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.22);
      color: white;
      padding: 14px;
      border-radius: 14px;
      outline: none;
    }

    .primary {
      width: 100%;
      border: 0;
      background: var(--indigo);
      color: white;
      margin-top: 20px;
      padding: 14px;
      border-radius: 14px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .12em;
      cursor: pointer;
    }

    .error {
      background: rgba(251,113,133,.1);
      border: 1px solid rgba(251,113,133,.25);
      color: #fecdd3;
      padding: 12px;
      border-radius: 14px;
      margin-top: 16px;
      display: none;
      font-size: 13px;
    }

    @media (max-width: 1050px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .cards, .two, .module-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
      .content { padding: 20px; }
      .search { display: none; }
    }
  </style>
</head>
<body>
  <div id="login" class="login hidden">
    <form class="login-card" id="loginForm">
      <div class="logo">G</div>
      <h1>GoodAppBackEnd</h1>
      <p>Sign in with your GoodOS owner account to access the production backend console.</p>
      <div id="loginError" class="error"></div>
      <label>Email</label>
      <input id="email" type="email" value="mgoodloe1988@gmail.com" required />
      <label>Password</label>
      <input id="password" type="password" required />
      <button class="primary" type="submit">Sign In</button>
    </form>
  </div>

  <div id="app" class="shell hidden">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">G</div>
        <div>
          <h1>GoodAppBackEnd</h1>
          <p>Self-hosted backend console</p>
        </div>
      </div>

      <div class="nav">
        <div class="nav-section">
          <div class="nav-title">Core</div>
          <button class="active" data-view="dashboard">Dashboard</button>
          <button data-view="auth">Auth / Users</button>
          <button data-view="apps">App Registry</button>
          <button data-view="database">Database Browser</button>
          <button data-view="storage">Storage / Files</button>
        </div>

        <div class="nav-section">
          <div class="nav-title">Build</div>
          <button data-view="api">API Keys</button>
          <button data-view="webhooks">Webhooks</button>
          <button data-view="realtime">Realtime Events</button>
          <button data-view="functions">Edge Functions</button>
        </div>

        <div class="nav-section">
          <div class="nav-title">Operate</div>
          <button data-view="logs">Logs & Monitoring</button>
          <button data-view="security">Security Rules</button>
          <button data-view="backups">Backups</button>
          <button data-view="settings">Settings</button>
        </div>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div class="search">
          ⌘
          <input id="searchInput" placeholder="Search backend resources, users, apps, logs..." />
        </div>
        <div class="session">
          <div class="pill"><span class="status-dot"></span>Production</div>
          <div class="pill" id="userPill">Loading...</div>
          <button class="logout" id="logoutBtn">Logout</button>
        </div>
      </div>

      <section class="content" id="view"></section>
    </main>
  </div>

<script>
const state = {
  user: null,
  overview: {},
  apps: [],
  users: [],
  tables: [],
  memberships: [],
  logs: [],
  backups: [],
  security: {},
  apiKeys: [],
  webhooks: [],
  webhookDeliveries: [],
  buckets: [],
  events: [],
  view: "dashboard",
};

async function request(path, options = {}) {
  const response = await fetch(path, {
    ...options,
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      ...(options.headers || {})
    }
  });

  const data = await response.json().catch(() => ({}));

  if (!response.ok || data.success === false) {
    throw new Error(data.message || "Request failed");
  }

  return data;
}

function safeText(value) {
  return String(value ?? "").replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
}

async function checkSession() {
  try {
    const data = await request("/api/auth/me");
    state.user = data.user;
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("userPill").textContent = state.user.displayName || state.user.email;

    try {
      await loadData();
    } catch (dataError) {
      console.error("Console data load failed:", dataError);
      state.overview = {
        status: "data-error",
        environment: "production",
        version: "1.0.0",
        stats: {},
        runtime: {},
        error: dataError.message || "Console data failed to load."
      };
    }

    render();
  } catch (authError) {
    console.error("Auth check failed:", authError);
    document.getElementById("app").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
  }
}

async function loadData() {
  try {
    const dashboardPayload = await request("/api/admin/dashboard-real-page-data");
    const dashboardData = dashboardPayload.data || dashboardPayload;
    const counts = dashboardData.counts || {};
    const runtime = dashboardData.runtime || {};

    state.overview = {
      status: "operational",
      environment: runtime.environment || "production",
      version: runtime.version || "1.0.0",
      runtime: {
        node: runtime.node || "-",
        uptimeFormatted: runtime.uptime || "-",
        uptimeSeconds: runtime.uptimeSeconds || 0,
        memoryMb: {
          heapUsed: runtime.memoryHeapMb || "-"
        }
      },
      stats: {
        users: counts.users || 0,
        activeApps: counts.activeApps || 0,
        activeMemberships: counts.activeMemberships || 0,
        sessions: counts.sessions || 0,
        apiKeys: counts.apiKeys || 0,
        webhooks: counts.webhooks || 0,
        buckets: counts.storageBuckets || 0,
        files: counts.storageFiles || 0
      }
    };

    state.apps = Array.isArray(dashboardData.apps) ? dashboardData.apps : [];
    state.users = Array.isArray(dashboardData.users) ? dashboardData.users : [];
    state.memberships = Array.isArray(dashboardData.memberships) ? dashboardData.memberships : [];
    state.sessions = Array.isArray(dashboardData.sessions) ? dashboardData.sessions : [];
    state.tables = Array.isArray(state.tables) ? state.tables : [];
    state.logs = Array.isArray(state.logs) ? state.logs : [];
    state.backups = Array.isArray(state.backups) ? state.backups : [];
    state.security = state.security || {};
    state.events = Array.isArray(state.events) ? state.events : [];

    try {
      const apiPayload = await request("/api/admin/api-keys-page-data");
      const apiData = apiPayload.data || apiPayload;
      state.apiKeys = Array.isArray(apiData.apiKeys) ? apiData.apiKeys : [];
    } catch (error) {
      state.apiKeys = Array.isArray(state.apiKeys) ? state.apiKeys : [];
    }

    try {
      const storagePayload = await request("/api/admin/storage-page-data");
      const storageData = storagePayload.data || storagePayload;
      state.buckets = Array.isArray(storageData.buckets) ? storageData.buckets : [];
      state.storageBuckets = state.buckets;
      state.storageFiles = Array.isArray(storageData.files) ? storageData.files : [];
      state.storageSignedUrls = Array.isArray(storageData.signedUrls) ? storageData.signedUrls : [];
    } catch (error) {
      state.buckets = Array.isArray(state.buckets) ? state.buckets : [];
      state.storageFiles = Array.isArray(state.storageFiles) ? state.storageFiles : [];
      state.storageSignedUrls = Array.isArray(state.storageSignedUrls) ? state.storageSignedUrls : [];
    }

    try {
      const webhookPayload = await request("/api/admin/webhooks-page-data");
      const webhookData = webhookPayload.data || webhookPayload;
      state.webhooks = Array.isArray(webhookData.webhooks) ? webhookData.webhooks : [];
      state.webhookDeliveries = Array.isArray(webhookData.webhookDeliveries) ? webhookData.webhookDeliveries : [];
    } catch (error) {
      state.webhooks = Array.isArray(state.webhooks) ? state.webhooks : [];
      state.webhookDeliveries = Array.isArray(state.webhookDeliveries) ? state.webhookDeliveries : [];
    }
  } catch (error) {
    console.error("Real dashboard data load failed:", error);
    state.overview = {
      status: "data-error",
      environment: "production",
      version: "1.0.0",
      stats: {},
      runtime: {},
      error: error.message || "Real dashboard data failed to load."
    };
  }
}



function goodosRenderNow() {
  if (typeof render === "function") {
    return render();
  }

  const view = document.getElementById("view");
  if (!view || !state) return;

  if (state.view === "dashboard") view.innerHTML = dashboard();
  else if (state.view === "auth") view.innerHTML = usersView();
  else if (state.view === "apps") view.innerHTML = appsView();
  else if (state.view === "database") view.innerHTML = databaseView();
  else if (state.view === "storage" || state.view === "storage-files") view.innerHTML = storageView();
  else if (state.view === "api") view.innerHTML = apiKeysView();
  else if (state.view === "webhooks") view.innerHTML = webhooksView();
  else if (state.view === "realtime") view.innerHTML = realtimeView();
  else if (state.view === "functions") view.innerHTML = functionsView();
  else if (state.view === "logs") view.innerHTML = logsView();
  else if (state.view === "security") view.innerHTML = securityView();
  else if (state.view === "backups") view.innerHTML = backupsView();
  else if (state.view === "settings") view.innerHTML = settingsView();
}

window.goodosRenderNow = goodosRenderNow;

function card(label, value, sub = "") {
  return '<div class="card"><div class="label">' + label + '</div><div class="value">' + safeText(value) + '</div><div class="sub">' + safeText(sub) + '</div></div>';
}

function hero(title, body, badge = "") {
  return '<div class="hero"><div><h2>' + title + '</h2><p>' + body + '</p></div>' + (badge ? '<div class="pill"><span class="status-dot"></span>' + badge + '</div>' : '') + '</div>';
}

function appsTable() {
  return `
    <table>
      <thead><tr><th>App</th><th>Domain</th><th>Status</th><th>Members</th></tr></thead>
      <tbody>
        ${state.apps.map(app => `
          <tr>
            <td><strong>${safeText(app.name)}</strong><div class="muted">${safeText(app.id)}</div></td>
            <td>${safeText(app.domain || "-")}</td>
            <td><span class="badge">${safeText(app.status || "active")}</span></td>
            <td>${safeText(app.memberCount ?? "-")}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

function dashboard() {
  const stats = state.overview?.stats || {};
  const apiKeys = Array.isArray(state.apiKeys) ? state.apiKeys : [];
  const buckets = Array.isArray(state.buckets) ? state.buckets : (Array.isArray(state.storageBuckets) ? state.storageBuckets : []);
  const files = Array.isArray(state.storageFiles) ? state.storageFiles : [];
  const webhooks = Array.isArray(state.webhooks) ? state.webhooks : [];
  const deliveries = Array.isArray(state.webhookDeliveries) ? state.webhookDeliveries : [];

  return `
    ${hero("Backend Console", "GoodAppBackEnd live production backend data: auth, apps, storage, API keys, webhooks, logs, realtime, and security controls.", state.overview?.status || "operational")}

    <div class="grid cards">
      ${card("Users", stats.users ?? state.users.length, "GoodOS accounts")}
      ${card("Apps", stats.activeApps ?? state.apps.length, "Active registered apps")}
      ${card("Memberships", stats.activeMemberships ?? state.memberships.length, "Active app access grants")}
      ${card("Sessions", stats.sessions ?? 0, "Active session table")}
    </div>

    <div class="grid cards" style="margin-top:18px;">
      ${card("Storage Buckets", buckets.length || stats.buckets || 0, "Real bucket records")}
      ${card("Storage Files", files.length || stats.files || 0, "Real uploaded files")}
      ${card("API Keys", apiKeys.length || stats.apiKeys || 0, "Real API key records")}
      ${card("Webhooks", webhooks.length || stats.webhooks || 0, "Real webhook endpoints")}
    </div>

    <div class="grid two" style="margin-top:18px;">
      <div class="card">
        <div class="section-head"><h3>Registered Apps</h3><span class="badge">Live Registry</span></div>
        ${appsTable()}
      </div>

      <div class="card">
        <div class="section-head"><h3>Runtime</h3><span class="badge">Healthy</span></div>
        <table>
          <tr><td>Environment</td><td>${safeText(state.overview?.environment || "production")}</td></tr>
          <tr><td>Version</td><td>${safeText(state.overview?.version || "1.0.0")}</td></tr>
          <tr><td>Node</td><td>${safeText(state.overview?.runtime?.node || "-")}</td></tr>
          <tr><td>Uptime</td><td>${safeText(state.overview?.runtime?.uptimeFormatted || state.overview?.runtime?.uptimeSeconds || "-")}</td></tr>
          <tr><td>Memory</td><td>${safeText(state.overview?.runtime?.memoryMb?.heapUsed || "-")} MB heap</td></tr>
          <tr><td>Database</td><td><span class="badge">Connected</span></td></tr>
        </table>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="section-head"><h3>Actual API Keys</h3><span class="badge">Live Data</span></div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Prefix</th>
            <th>Type</th>
            <th>Scopes</th>
            <th>Apps</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${apiKeys.slice(0, 8).map(key => `
            <tr>
              <td><strong>${safeText(key.name || "-")}</strong><div class="muted">${safeText(key.id || "")}</div></td>
              <td>${safeText(key.keyPrefix || key.key_prefix || "-")}</td>
              <td>${safeText(key.type || "-")}</td>
              <td>${safeText((key.scopes || []).join(", ") || "-")}</td>
              <td>${safeText((key.allowedAppIds || key.allowed_app_ids || []).join(", ") || "-")}</td>
              <td><span class="badge">${safeText(key.status || "-")}</span></td>
            </tr>
          `).join("") || '<tr><td colspan="6" class="muted">No API key records loaded.</td></tr>'}
        </tbody>

window.parseDatabasePromptValue = function parseDatabasePromptValue(value) {
  if (value === null) return null;
  const trimmed = String(value).trim();

  if (trimmed === "") return "";
  if (trimmed === "null") return null;
  if (trimmed === "true") return true;
  if (trimmed === "false") return false;
  if (!Number.isNaN(Number(trimmed)) && trimmed !== "") return Number(trimmed);

  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    try {
      return JSON.parse(trimmed);
    } catch (error) {
      return value;
    }
  }

  return value;
};

window.insertDatabaseRow = async function insertDatabaseRow() {

  let row;

  try {
    row = JSON.parse(jsonText);

    alert("Invalid JSON.");
    return;
  }

  if (!row || typeof row !== "object" || Array.isArray(row)) {
    alert("Row must be a JSON object.");
    return;
  }

  const confirmed = confirm("Insert this row into " + state.selectedDbTable + "?");
  if (!confirmed) return;

  try {

      cache: "no-store",

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {

  const unique = confirm("Should this be a UNIQUE index? Press OK for unique, Cancel for normal index.");

  try {
    const response = await fetch("/api/admin/database/schema/create-index-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ tableName: targetTable, columnName, unique })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Create index failed with status " + response.status);
    }

    alert("Index created.");
    await window.loadLiveDatabase();
  } catch (error) {
    alert("Create index failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};


window.loadDatabaseTableMetadata = async function loadDatabaseTableMetadata(tableName) {
  if (!tableName) return alert("Missing table name.");

  state.selectedDbMetadataTable = tableName;
  state.selectedDbMetadataLoading = true;
  state.selectedDbMetadataError = "";
  if (typeof goodosRenderNow === 'function') goodosRenderNow(); else if (typeof render === 'function') render();

  try {
    const response = await fetch("/api/admin/database/tables/" + encodeURIComponent(tableName) + "/metadata?t=" + Date.now(), {
      method: "GET",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json" }
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Metadata load failed with status " + response.status);
    }

    const data = payload.data || payload;
    state.selectedDbMetadataTable = tableName;
    state.selectedDbMetadata = data;
    state.selectedDbMetadataLoading = false;
    state.selectedDbMetadataError = "";
    if (typeof goodosRenderNow === 'function') goodosRenderNow(); else if (typeof render === 'function') render();
  } catch (error) {
    state.selectedDbMetadataLoading = false;
    state.selectedDbMetadataError = error.message || "Failed to load table metadata.";
    alert("Table metadata failed: " + state.selectedDbMetadataError);
    console.error(error);
    if (typeof goodosRenderNow === 'function') goodosRenderNow(); else if (typeof render === 'function') render();
  }
};

window.loadLiveLogs = async function loadLiveLogs() {
  try {
    const params = new URLSearchParams();
    params.set("t", Date.now());
    params.set("level", state.logLevelFilter || "all");
    params.set("search", state.logSearch || "");
    params.set("limit", state.logLimit || "250");

    const response = await fetch("/api/admin/logs-page-data?" + params.toString(), {
      method: "GET",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json" }
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Logs refresh failed with status " + response.status);
    }

    const data = payload.data || payload;

    state.logs = Array.isArray(data.logs) ? data.logs : [];
    state.logCounts = data.counts || {};
    state.logFiles = data.files || {};
    state.logFilters = data.filters || {};
    state.logsLiveLoaded = true;
    state.logsLiveLoading = false;
    state.logsLiveError = "";

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  } catch (error) {
    state.logsLiveLoaded = true;
    state.logsLiveLoading = false;
    state.logsLiveError = error.message || "Failed to load logs.";

    console.error("Logs refresh failed:", error);

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  }
};

window.editSecuritySetting = async function editSecuritySetting(id, label, currentValue, valueType) {
  if (!id) return alert("Missing setting id.");

  const nextValueText = prompt("New value for " + (label || "setting") + ":", currentValue ?? "");
  if (nextValueText === null) return;

  let value = nextValueText;

  if (String(valueType || "").toLowerCase() === "boolean") {
    value = ["true", "1", "yes", "on", "enabled", "active"].includes(String(nextValueText).toLowerCase());
  } else if (String(valueType || "").toLowerCase() === "number") {
    value = Number(nextValueText || 0);
  } else if (String(valueType || "").toLowerCase() === "json") {
    try {
      value = JSON.parse(nextValueText || "{}");
    } catch {
      alert("Invalid JSON value.");
      return;
    }
  }

  try {
    const response = await fetch("/api/admin/security/settings/" + encodeURIComponent(id) + "/update-safe", {

      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ value })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Security setting update failed with status " + response.status);

};

window.editPlatformSetting = async function editPlatformSetting(settingKey, currentValue) {
  if (!settingKey) return alert("Missing setting key.");

  const nextValue = prompt("New value for " + settingKey + ":", currentValue ?? "");
  if (nextValue === null) return;

  let parsedValue = nextValue;

  if (nextValue === "true") parsedValue = true;
  else if (nextValue === "false") parsedValue = false;
  else if (!Number.isNaN(Number(nextValue)) && nextValue.trim() !== "") parsedValue = Number(nextValue);
  else if (nextValue.trim().startsWith("[") || nextValue.trim().startsWith("{")) {
    try {
      parsedValue = JSON.parse(nextValue);
    } catch (error) {
      alert("Invalid JSON value.");
      return;
    }
  }

  try {
    const response = await fetch("/api/admin/settings/update-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        settingKey,
        value: parsedValue
      })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Setting update failed with status " + response.status);
    }

    alert("Setting updated.");
    await window.loadLiveSettings();
  } catch (error) {
    alert("Setting update failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.editStorageBucketPolicy = async function editStorageBucketPolicy(bucketId) {
  if (!bucketId) return alert("Missing bucket id.");

  const bucket = (state.storageBuckets || []).find(item => item.id === bucketId);

  if (!bucket) return alert("Bucket not found in current page data.");

  const currentPolicy = {
    visibility: bucket.visibility || "private",
    maxFileSizeBytes: Number(bucket.maxFileSizeBytes || bucket.max_file_size_bytes || 10485760),
    allowedMimeTypes: bucket.allowedMimeTypes || bucket.allowed_mime_types || [],
    allowedExtensions: bucket.allowedExtensions || bucket.allowed_extensions || [],
    publicReadEnabled: Boolean(bucket.publicReadEnabled || bucket.public_read_enabled),
    signedUrlTtlSeconds: Number(bucket.signedUrlTtlSeconds || bucket.signed_url_ttl_seconds || 3600),
    fileVersioningEnabled: Boolean(bucket.fileVersioningEnabled || bucket.file_versioning_enabled),
    virusScanRequired: Boolean(bucket.virusScanRequired || bucket.virus_scan_required),
    encryptionMode: bucket.encryptionMode || bucket.encryption_mode || "local"
  };

  const policyText = prompt(
    "Edit bucket policy JSON:",
    JSON.stringify(currentPolicy, null, 2)
  );

  if (policyText === null) return;

  let policy;

  try {
    policy = JSON.parse(policyText);

function storageView() {
  if (!state.storageManagerLoaded && !state.storageManagerLoading) {
    state.storageManagerLoading = true;
    setTimeout(() => window.loadStorageManager(), 100);
  }

  const buckets = Array.isArray(state.storageBuckets) ? state.storageBuckets : (Array.isArray(state.buckets) ? state.buckets : []);
  const files = Array.isArray(state.storageFiles) ? state.storageFiles : [];
  const counts = state.storageCounts || {};
  const bucketStats = state.storageBucketStats || {};
  const selectedBucket = state.selectedStorageBucket || (buckets[0]?.id || "");
  const searchTerm = String(state.storageSearch || "").toLowerCase().trim();
  const selectedFolder = state.selectedStorageFolder || "";

  const filesForBucket = (bucketId) => files.filter(file => {
    return String(file.bucketId || file.bucket_id || "") === String(bucketId);
  });

  const bucketFolders = (bucketFiles) => {
    return Array.from(new Set(
      bucketFiles
        .map(file => file.folderPath || file.folder_path || "")
        .filter(Boolean)
    )).sort();
  };

  const filterFiles = (bucketFiles) => bucketFiles.filter(file => {
    const fileName = file.displayName || file.display_name || file.originalName || file.original_name || file.filename || file.fileName || file.file_name || file.name || file.id || "";
    const folderPath = file.folderPath || file.folder_path || "";
    const mimeType = file.mimeType || file.mime_type || file.type || "";
    const searchable = `${fileName} ${folderPath} ${mimeType}`.toLowerCase();

    const matchesSearch = !searchTerm || searchable.includes(searchTerm);
    const matchesFolder = !selectedFolder || folderPath === selectedFolder;

    return matchesSearch && matchesFolder;
  });

  const inlineFileManager = (bucket) => {
    const bucketId = bucket.id;
    if (selectedBucket !== bucketId) return "";

    const rawBucketFiles = filesForBucket(bucketId);
    const folders = bucketFolders(rawBucketFiles);
    const bucketFiles = filterFiles(rawBucketFiles);

    return `
      <tr>
        <td colspan="6" style="padding:0;">
          <div class="card" style="margin:12px 0 18px 0; border-color:rgba(96,165,250,.35); background:rgba(96,165,250,.04);">
            <div class="section-head">
              <h3>Files: ${safeText(bucket.name || bucketId)}</h3>
              <div>
                <button class="logout" onclick="window.uploadStorageFile('${safeText(bucketId)}')">Upload File</button>
                <button class="logout" onclick="window.editStorageBucketPolicy('${safeText(bucketId)}')">Edit Policy</button>

              </div>
            </div>

            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;">
              <input
                value="${safeText(state.storageSearch || "")}"
                oninput="window.setStorageSearch(this.value)"
                placeholder="Search files..."
                style="flex:1; min-width:240px; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:#fff;"
              />
              <button class="logout" onclick="window.filterStorageFolder('')">All Folders</button>
              ${folders.map(folder => `<button class="logout" onclick="window.filterStorageFolder('${safeText(folder)}')">${safeText(folder)}</button>`).join("")}
            </div>

            <div class="grid cards" style="margin-bottom:18px;">
              ${card("Files", bucketFiles.length, selectedFolder ? "Filtered folder files" : "Files in this bucket")}
              ${card("Bytes", bucketFiles.reduce((sum, file) => sum + Number(file.sizeBytes || file.size_bytes || 0), 0), "Tracked size")}
              ${card("Folder", selectedFolder || "All", "Current folder filter")}
              ${card("Status", bucket.status || "active", "Bucket status")}
            </div>


            <div class="card" style="margin:0 0 18px 0; background:rgba(255,255,255,.035);">
              <div class="section-head">
                <h3>Bucket Policy</h3>
                <span class="badge">Controls</span>
              </div>
              <div class="grid cards">
                ${card("Max File Size", bucket.maxFileSizeBytes || bucket.max_file_size_bytes || 10485760, "Bytes per upload")}
                ${card("Allowed MIME", ((bucket.allowedMimeTypes || bucket.allowed_mime_types || []).length ? (bucket.allowedMimeTypes || bucket.allowed_mime_types || []).join(", ") : "Any"), "MIME allowlist")}
                ${card("Allowed Ext", ((bucket.allowedExtensions || bucket.allowed_extensions || []).length ? (bucket.allowedExtensions || bucket.allowed_extensions || []).join(", ") : "Any"), "Extension allowlist")}
                ${card("Signed URL TTL", bucket.signedUrlTtlSeconds || bucket.signed_url_ttl_seconds || 3600, "Seconds")}
              </div>
              <div class="grid cards" style="margin-top:12px;">
                ${card("Public Read", (bucket.publicReadEnabled || bucket.public_read_enabled) ? "Enabled" : "Disabled", "Public file policy")}
                ${card("Versioning", (bucket.fileVersioningEnabled || bucket.file_versioning_enabled) ? "Enabled" : "Disabled", "File version history")}
                ${card("Virus Scan", (bucket.virusScanRequired || bucket.virus_scan_required) ? "Required" : "Not required", "Upload security")}
                ${card("Policy Enforced", "Active", "Upload validation")}
                ${card("Encryption", bucket.encryptionMode || bucket.encryption_mode || "local", "Storage encryption mode")}
              </div>
            </div>

            <div style="overflow:auto; max-height:520px; border:1px solid rgba(255,255,255,.08); border-radius:14px;">
              <table>
                <thead>
                  <tr>
                    <th>File</th>
                    <th>Folder</th>
                    <th>Type</th>
                    <th>Size</th>
                    <th>Status</th>
                    <th>Action</th>

                </thead>
                <tbody>
                  ${bucketFiles.map(file => {
                    const fileName = file.displayName || file.display_name || file.originalName || file.original_name || file.filename || file.fileName || file.file_name || file.name || file.id;
                    const folderPath = file.folderPath || file.folder_path || "";
                    const mimeType = file.mimeType || file.mime_type || file.type || "-";
                    const size = file.sizeBytes || file.size_bytes || 0;

                    return `
                      <tr>
                        <td><strong>${safeText(fileName || "-")}</strong><div class="muted">${safeText(file.id || "")}</div></td>
                        <td>${safeText(folderPath || "root")}</td>
                        <td>${safeText(mimeType)}</td>
                        <td>${safeText(String(size))}</td>

              </table>
            </div>

  };

  return `
    ${hero("Storage / Files", "Buckets, uploads, folders, search, signed URLs, downloads, and file lifecycle controls.")}
    <div class="section-head">
      <h3>Storage Buckets</h3>
      <div>

    <div class="grid cards">
      ${card("Buckets", counts.buckets ?? buckets.length, "Active storage buckets")}
      ${card("Files", counts.files ?? files.length, "Tracked files")}
      ${card("Storage Bytes", counts.totalBytes ?? files.reduce((sum, file) => sum + Number(file.sizeBytes || file.size_bytes || 0), 0), "Total file bytes")}

}



window.loadLiveWebhooks = async function loadLiveWebhooks() {
  try {
    const response = await fetch("/api/admin/webhooks-page-data?t=" + Date.now(), {
      method: "GET",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json" }
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Webhook refresh failed with status " + response.status);
    }

    const data = payload.data || payload;
    state.webhooks = Array.isArray(data.webhooks) ? data.webhooks : [];
    state.webhookDeliveries = Array.isArray(data.deliveries) ? data.deliveries : (Array.isArray(data.webhookDeliveries) ? data.webhookDeliveries : []);
    state.webhookCounts = data.counts || {};

    try {
      const receiptsResponse = await fetch("/api/admin/webhook-test-receipts-page-data?t=" + Date.now(), {
        method: "GET",
        credentials: "include",
        cache: "no-store",
        headers: { "Accept": "application/json" }
      });

      const receiptsPayload = await receiptsResponse.json().catch(() => ({}));
      const receiptsData = receiptsPayload.data || receiptsPayload;
      state.webhookReceipts = Array.isArray(receiptsData.receipts) ? receiptsData.receipts : [];
      state.webhookReceiptCounts = receiptsData.counts || {};
    } catch (receiptError) {
      state.webhookReceipts = Array.isArray(state.webhookReceipts) ? state.webhookReceipts : [];
      state.webhookReceiptCounts = state.webhookReceiptCounts || {};
    }
    state.webhooksLoaded = true;
    state.webhooksLoading = false;
    state.webhooksError = "";

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  } catch (error) {
    state.webhooksLoading = false;
    state.webhooksError = error.message || "Failed to load webhooks.";
    alert("Webhook refresh failed: " + state.webhooksError);
    console.error(error);

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  }
};

window.createWebhook = async function createWebhook() {

  }

function prettyJsonForAlert(value) {
  try {
    if (typeof value === "string") {
      try {
        return JSON.stringify(JSON.parse(value), null, 2);
      } catch {
        return value;
      }
    }

    return JSON.stringify(value || {}, null, 2);
  } catch {
    return String(value || "");
  }
}

window.connectRealtimeStream = function connectRealtimeStream() {
  const channel = prompt("Subscribe to channel. Use * for all channels:", state.realtimeSelectedChannel || "system");
  if (channel === null) return;

  if (state.realtimeEventSource) {
    try { state.realtimeEventSource.close(); } catch {}
    state.realtimeEventSource = null;
  }

  state.realtimeSelectedChannel = channel || "system";
  state.realtimeLiveStatus = "connecting";

  const source = new EventSource("/api/admin/realtime-events/stream-safe?channel=" + encodeURIComponent(state.realtimeSelectedChannel));

  source.addEventListener("connected", (event) => {
    state.realtimeLiveStatus = "connected";
    state.realtimeConnection = JSON.parse(event.data || "{}");
    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  });

  source.addEventListener("realtime", (event) => {
    const liveEvent = JSON.parse(event.data || "{}");
    state.realtimeEvents = [liveEvent, ...(Array.isArray(state.realtimeEvents) ? state.realtimeEvents : [])].slice(0, 250);
    state.realtimeLastEvent = liveEvent;
    state.realtimeLiveStatus = "receiving";

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  });

  source.addEventListener("ping", () => {
    state.realtimeLastPing = new Date().toISOString();
  });

  source.onerror = function realtimeStreamError() {
    state.realtimeLiveStatus = "error-or-reconnecting";
    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  };

  state.realtimeEventSource = source;

  if (typeof goodosRenderNow === "function") goodosRenderNow();
  else if (typeof render === "function") render();
};

window.disconnectRealtimeStream = function disconnectRealtimeStream() {
  if (state.realtimeEventSource) {
    try { state.realtimeEventSource.close(); } catch {}
  }

  state.realtimeEventSource = null;
  state.realtimeLiveStatus = "disconnected";
  state.realtimeConnection = null;

  if (typeof goodosRenderNow === "function") goodosRenderNow();
  else if (typeof render === "function") render();
};

    const data = payload.data || payload;
    alert("Edge function run complete. Status: " + safeText(data.run?.status || "unknown"));
    await window.loadEdgeFunctions();
  } catch (error) {
    alert("Run function failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.toggleEdgeFunction = async function toggleEdgeFunction(id, currentStatus) {
  const nextStatus = currentStatus === "active" ? "disabled" : "active";

  if (!confirm("Set this function to " + nextStatus + "?")) return;

  try {
    const response = await fetch("/api/admin/edge-functions/" + encodeURIComponent(id) + "/toggle-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ status: nextStatus })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Status update failed with status " + response.status);
    }

    alert("Function status updated.");
    await window.loadEdgeFunctions();
  } catch (error) {
    alert("Function status update failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.viewEdgeFunctionRunDetail = async function viewEdgeFunctionRunDetail(id) {
  if (!id) return alert("Missing run id.");

  try {
    const response = await fetch("/api/admin/edge-functions/runs/" + encodeURIComponent(id) + "/detail-safe?t=" + Date.now(), {
      method: "GET",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json" }
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Run detail failed with status " + response.status);
    }

    const run = (payload.data || payload).run || {};
    alert("Edge Function Run Detail:\\n\\n" + prettyJsonForAlert(run));
  } catch (error) {
    alert("Run detail failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};


function functionsView() {
  if (!state.edgeFunctionsLoaded && !state.edgeFunctionsLoading) {
    state.edgeFunctionsLoading = true;
    setTimeout(() => window.loadEdgeFunctions(), 100);
  }

  const functions = Array.isArray(state.edgeFunctions) ? state.edgeFunctions : [];
  const runs = Array.isArray(state.edgeFunctionRuns) ? state.edgeFunctionRuns : [];
  const counts = state.edgeFunctionCounts || {};

  return `
    ${hero("Edge Functions", "Controlled backend functions, manual execution, status control, and run logs.")}
    <div class="section-head">
      <h3>Function Registry</h3>
      <div>
        <button class="logout" onclick="window.refreshEdgeFunctionsNow()">Refresh Data</button>
        <button class="logout" onclick="window.createEdgeFunction()">Create Function</button>
      </div>
    </div>

    ${state.edgeFunctionsLoading ? `<div class="card" style="margin-bottom:18px;"><p class="muted">Loading edge functions...</p></div>` : ""}
    ${state.edgeFunctionsError ? `<div class="card" style="margin-bottom:18px;"><p class="muted">Edge functions error: ${safeText(state.edgeFunctionsError)}</p></div>` : ""}

    <div class="grid cards">
      ${card("Functions", counts.functions ?? functions.length, "Registered functions")}
      ${card("Active", counts.active ?? functions.filter(item => item.status === "active").length, "Executable")}
      ${card("Runs", counts.runs ?? runs.length, "Execution logs")}
      ${card("Failed Runs", counts.failedRuns ?? runs.filter(item => item.status === "failed").length, "Needs review")}
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="section-head"><h3>Registered Functions</h3><span class="badge">Controlled Runtime</span></div>
      <table>
        <thead>
          <tr>
            <th>Function</th>
            <th>Type</th>
            <th>Trigger</th>
            <th>Status</th>
            <th>Runs</th>
            <th>Last Run</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          ${functions.map(fn => `
            <tr>
              <td><strong>${safeText(fn.name || "-")}</strong><div class="muted">${safeText(fn.id || "")}</div><div class="muted">${safeText(fn.routePath || "")}</div></td>
              <td>${safeText(fn.type || "-")}</td>
              <td>${safeText(fn.triggerType || "-")}</td>
              <td><span class="badge">${safeText(fn.status || "-")}</span></td>
              <td>${safeText(String(fn.runCount || 0))}</td>
              <td>${fn.lastRunAt ? new Date(fn.lastRunAt).toLocaleString() : "-"}</td>
              <td>
                <button class="logout" onclick="window.runEdgeFunction('${safeText(fn.id)}')">Run</button>
                <button class="logout" onclick="window.toggleEdgeFunction('${safeText(fn.id)}','${safeText(fn.status || "")}')">${fn.status === "active" ? "Disable" : "Enable"}</button>
              </td>
            </tr>
          `).join("") || '<tr><td colspan="7" class="muted">No edge functions found.</td></tr>'}
        </tbody>
      </table>
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="section-head"><h3>Run Logs</h3><span class="badge">Newest First</span></div>
      <table>
        <thead>
          <tr>
            <th>Run</th>
            <th>Function</th>
            <th>Trigger</th>
            <th>Status</th>
            <th>Duration</th>
            <th>Started</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          ${runs.map(run => `
            <tr>
              <td><strong>${safeText(run.id || "-")}</strong></td>
              <td>${safeText(run.functionName || run.functionId || "-")}</td>
              <td>${safeText(run.triggerType || "-")}</td>
              <td><span class="badge">${safeText(run.status || "-")}</span></td>
              <td>${safeText(String(run.durationMs || 0))}ms</td>
              <td>${run.startedAt ? new Date(run.startedAt).toLocaleString() : "-"}</td>
              <td><button class="logout" onclick="window.viewEdgeFunctionRunDetail('${safeText(run.id)}')">Details</button></td>
            </tr>
          `).join("") || '<tr><td colspan="7" class="muted">No function runs yet. Click Run on a function.</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}


function render() {
  const view = document.getElementById("view");

  if (state.view === "dashboard") view.innerHTML = dashboard();
  else if (state.view === "auth") view.innerHTML = usersView();
  else if (state.view === "apps") view.innerHTML = appsView();
  else if (state.view === "database") view.innerHTML = databaseView();
  else if (state.view === "storage" || state.view === "storage-files") view.innerHTML = storageView();
  else if (state.view === "api") view.innerHTML = apiKeysView();
  else if (state.view === "webhooks") view.innerHTML = webhooksView();
  else if (state.view === "realtime") view.innerHTML = realtimeView();
  else if (state.view === "functions") view.innerHTML = functionsView();
  else if (state.view === "logs") view.innerHTML = logsView();
  else if (state.view === "security") view.innerHTML = securityView();
  else if (state.view === "backups") view.innerHTML = backupsView();
  else if (state.view === "settings") view.innerHTML = settingsView();
}



async function createBackup() {
  if (!confirm("Create a database snapshot now?")) return;

  const payload = await request("/api/admin/backups/create", {
    method: "POST"
  });

  alert("Backup created: " + (payload.data?.backup?.name || "snapshot"));
  await refreshConsole();
}

async function createTestEvent() {
  await request("/api/admin/events/test", {
    method: "POST"
  });

  await refreshConsole();
}

async function refreshConsole() {
  await loadData();
  render();
}

async function createApiKey() {
  const name = prompt("API key name:");
  if (!name) return;

  const typeChoice = prompt("Type: read_only or full_access", "read_only") || "read_only";

  const payload = await request("/api/admin/api-keys", {
    method: "POST",
    body: JSON.stringify({ name, type: typeChoice })
  });

  alert("Copy this API key now. It will not be shown again:\n\n" + payload.data.secret);
  await refreshConsole();
}

async function revokeApiKey(id) {
  if (!confirm("Revoke this API key?")) return;

  await request("/api/admin/api-keys/" + encodeURIComponent(id) + "/revoke", {
    method: "POST"
  });

  await refreshConsole();
}


async function sendTestWebhook(webhookId) {
  const payload = await request("/api/admin/webhooks/" + encodeURIComponent(webhookId) + "/test", {
    method: "POST"
  });

  const status = payload.data?.delivery?.status || "sent";
  alert("Test webhook delivery status: " + status);
  await refreshConsole();
}

async function retryWebhookDelivery(deliveryId) {
  const payload = await request("/api/admin/webhook-deliveries/" + encodeURIComponent(deliveryId) + "/retry", {
    method: "POST"
  });

  const status = payload.data?.delivery?.status || "retried";
  alert("Webhook retry status: " + status);
  await refreshConsole();
}


async function loadLiveWebhooks() {
  try {
    const webhooksPayload = await request("/api/admin/webhooks-live");
    const deliveriesPayload = await request("/api/admin/webhook-deliveries-live");

    state.webhooks = Array.isArray(webhooksPayload.data?.webhooks)
      ? webhooksPayload.data.webhooks
      : [];

    state.webhookDeliveries = Array.isArray(deliveriesPayload.data?.deliveries)
      ? deliveriesPayload.data.deliveries
      : [];
  } catch (error) {
    console.error("Failed to load live webhooks:", error);
  }
}

async function createWebhook() {
  const name = prompt("Webhook name:");
  if (!name) return;

  const url = prompt("Webhook URL. Use a test endpoint first:");
  if (!url) return;

  const eventsRaw = prompt("Events to send. Use * for all events, or comma-separated event names:", "*") || "*";
  const events = eventsRaw.split(",").map(item => item.trim()).filter(Boolean);

  try {
    const payload = await request("/api/admin/webhooks/create-safe", {
      method: "POST",
      body: JSON.stringify({ name, url, events })
    });

    const secret = payload.data?.secret || "";
    const webhookName = payload.data?.webhook?.name || name;

    if (secret) {
      prompt("Webhook created: " + webhookName + "\\nCopy this secret now. It will not be shown again:", secret);
    } else {
      alert("Webhook created: " + webhookName);
    }

    await refreshConsole();
  } catch (error) {
    alert("Webhook creation failed: " + (error.message || "Unknown error"));
  }
}

async function disableWebhook(id) {
  if (!confirm("Disable this webhook?")) return;

  await request("/api/admin/webhooks/" + encodeURIComponent(id) + "/disable", {
    method: "POST"
  });

  await refreshConsole();
}

async function createBucket() {
  const name = prompt("Bucket name:");
  if (!name) return;

  const visibility = prompt("Visibility: private or public", "private") || "private";

  await request("/api/admin/storage/buckets", {
    method: "POST",
    body: JSON.stringify({ name, visibility })
  });

  await refreshConsole();
}


document.querySelectorAll("[data-view]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-view]").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    state.view = btn.dataset.view;
    render();
  });
});

document.getElementById("loginForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  const error = document.getElementById("loginError");
  error.style.display = "none";

  try {
    await request("/api/auth/login", {
      method: "POST",
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    await checkSession();
  } catch (err) {
    error.textContent = err.message;
    error.style.display = "block";
  }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await request("/api/auth/logout", { method: "POST" }).catch(() => null);
  location.reload();
});

document.getElementById("searchInput").addEventListener("input", event => {
  const term = event.target.value.toLowerCase().trim();
  if (!term) return render();

  const matches = [
    ...state.apps.map(app => "App: " + app.name + " — " + app.domain),
    ...state.users.map(user => "User: " + (user.displayName || user.email) + " — " + user.email),
    ...state.tables.map(table => "Table: " + table.tableName + " — " + table.rowCount + " rows"),
  ].filter(item => item.toLowerCase().includes(term));

  document.getElementById("view").innerHTML = `
    ${hero("Search Results", "Matching backend resources for: " + safeText(term))}
    <div class="card">
      ${matches.length === 0 ? '<p class="muted">No matches found.</p>' : matches.map(item => '<div style="padding:12px 0;border-bottom:1px solid var(--border);">' + safeText(item) + '</div>').join("")}
    </div>
  `;
});

checkSession();

window.goodosRenderStorageSafe = function goodosRenderStorageSafe() {
  try {
    const target = document.getElementById("view");
    if (target && typeof storageView === "function") {
      target.innerHTML = storageView();
    } else if (typeof render === "function") {
      render();
    }
  } catch (error) {
    console.error("Storage render failed:", error);
    alert("Storage render failed: " + (error.message || "Unknown error"));
  }
};

window.openStorageFilesView = function openStorageFilesView() {
  try {
    state.view = "storage";

    document.querySelectorAll("[data-view]").forEach((button) => {
      button.classList.toggle("active", button.dataset.view === "storage");
    });

    window.goodosRenderStorageSafe();

    setTimeout(() => {
      if (typeof window.loadStorageManager === "function") {
        window.loadStorageManager();
      } else if (typeof window.loadLiveStorage === "function") {
        window.loadLiveStorage();
      }
    }, 150);
  } catch (error) {
    console.error("Storage navigation failed:", error);
    alert("Storage navigation failed: " + (error.message || "Unknown error"));
  }
};

document.addEventListener("click", function goodosStorageNavClickFix(event) {
  const button = event.target.closest('[data-view="storage"], [data-view="storage-files"]');

  if (!button) return;

  const label = (button.textContent || "").trim().toLowerCase();

  if (!label.includes("storage")) return;

  event.preventDefault();
  event.stopPropagation();

  window.openStorageFilesView();
}, true);

</script>
