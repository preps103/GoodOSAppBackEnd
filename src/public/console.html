<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoodOS Cloud Console</title>
  <meta name="description" content="GoodOS Cloud backend hosting console." />
  <link rel="preload" href="/console-v2.js" as="script" />
  <style>
    :root {
      --bg: #07101f;
      --bg2: #0b1326;
      --sidebar: #07111f;
      --panel: rgba(18, 29, 53, .82);
      --panel2: rgba(22, 36, 66, .88);
      --line: rgba(148, 163, 184, .16);
      --line2: rgba(148, 163, 184, .26);
      --text: #f4f8ff;
      --muted: #9daac1;
      --soft: #dce8fa;
      --blue: #4f8cff;
      --cyan: #35d9ff;
      --purple: #8b5cf6;
      --green: #48e59b;
      --orange: #ff9f43;
      --red: #ff647c;
      --radius: 22px;
      --shadow: 0 28px 90px rgba(0,0,0,.32);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 12% 0%, rgba(79,140,255,.18), transparent 32%),
        radial-gradient(circle at 88% 4%, rgba(53,217,255,.11), transparent 30%),
        linear-gradient(145deg, #050b16 0%, #0b1326 48%, #080b17 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: -.015em;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.024) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.8), transparent 78%);
      z-index: 0;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: rgba(5, 12, 24, .94);
      border-right: 1px solid var(--line);
      box-shadow: 22px 0 70px rgba(0,0,0,.22);
      padding: 18px 16px;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 10px 22px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      color: #06111f;
      font-weight: 950;
      background: linear-gradient(135deg, var(--blue), var(--cyan) 45%, var(--purple));
      box-shadow: 0 16px 40px rgba(79,140,255,.28);
    }

    .brand strong {
      display: block;
      font-size: 18px;
      letter-spacing: -.045em;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .org {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 13px;
      border: 1px solid var(--line);
      background: rgba(18,29,53,.72);
      border-radius: 18px;
      margin-bottom: 18px;
    }

    .org-icon {
      width: 40px;
      height: 40px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      font-weight: 950;
      background: linear-gradient(135deg, var(--purple), var(--blue));
    }

    .org strong { display: block; }
    .org span { color: var(--muted); font-size: 12px; }

    .nav-section {
      margin: 18px 0;
    }

    .nav-title {
      color: #72809a;
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      font-weight: 950;
      margin: 0 10px 8px;
    }

    .nav-btn {
      width: 100%;
      height: 42px;
      border: 1px solid transparent;
      background: transparent;
      color: #d9e6f7;
      border-radius: 999px;
      padding: 0 13px;
      margin: 4px 0;
      display: flex;
      align-items: center;
      gap: 11px;
      text-align: left;
      font-weight: 850;
      cursor: pointer;
      transition: .15s ease;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,.06);
      border-color: var(--line);
      transform: translateX(2px);
    }

    .nav-btn.active {
      background:
        linear-gradient(135deg, rgba(79,140,255,.42), rgba(139,92,246,.32)),
        rgba(22,36,66,.98);
      border-color: rgba(139,92,246,.56);
      color: #fff;
      box-shadow: 0 18px 50px rgba(79,140,255,.18);
    }

    .nav-icon {
      width: 22px;
      text-align: center;
      opacity: .95;
    }

    .help {
      margin-top: 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(18,29,53,.66);
      padding: 15px;
    }

    .help strong { display: block; }
    .help p { color: var(--muted); margin: 6px 0 12px; font-size: 13px; line-height: 1.45; }

    .main {
      min-width: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      height: 70px;
      display: grid;
      grid-template-columns: minmax(280px, 560px) 1fr;
      gap: 18px;
      align-items: center;
      padding: 0 28px;
      background: rgba(6,12,24,.78);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(22px) saturate(150%);
    }

    .search {
      height: 42px;
      border: 1px solid var(--line2);
      border-radius: 16px;
      background: rgba(7,16,31,.72);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      color: var(--muted);
      min-width: 0;
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .pill, .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      background: rgba(18,29,53,.8);
      color: #dbeafe;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 18px rgba(72,229,155,.72);
    }

    .create {
      height: 42px;
      border: 0;
      border-radius: 14px;
      padding: 0 18px;
      color: white;
      font-weight: 950;
      cursor: pointer;
      background: linear-gradient(135deg, var(--purple), var(--blue), var(--cyan));
      box-shadow: 0 16px 45px rgba(79,140,255,.22);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      font-weight: 950;
    }

    .content {
      padding: 28px;
      max-width: 1520px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      min-height: 190px;
      background:
        radial-gradient(circle at 86% 24%, rgba(53,217,255,.20), transparent 30%),
        radial-gradient(circle at 65% 5%, rgba(139,92,246,.20), transparent 28%),
        linear-gradient(135deg, rgba(22,36,66,.88), rgba(12,21,42,.84));
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 10px 0 12px;
      font-size: clamp(34px, 4.2vw, 58px);
      line-height: .98;
      max-width: 780px;
      letter-spacing: -.06em;
    }

    .hero p {
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      margin: 0;
    }

    .hero-art {
      position: absolute;
      right: 38px;
      top: 34px;
      width: 310px;
      height: 140px;
      opacity: .92;
    }

    .orbit {
      position: absolute;
      inset: 30px 10px;
      border: 1px solid rgba(53,217,255,.22);
      transform: skewY(-13deg);
      border-radius: 18px;
    }

    .cube {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 13px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      box-shadow: 0 20px 50px rgba(79,140,255,.28);
    }

    .cube.one { left: 20px; top: 50px; }
    .cube.two { left: 105px; top: 16px; background: linear-gradient(135deg, var(--purple), var(--cyan)); }
    .cube.three { left: 192px; top: 62px; background: linear-gradient(135deg, var(--cyan), #1fbf99); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .kpi, .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.035)),
        rgba(18,29,53,.78);
      box-shadow: var(--shadow);
    }

    .kpi {
      padding: 18px;
      min-height: 145px;
    }

    .kpi small {
      display: block;
      color: #aebbd0;
      font-weight: 850;
    }

    .kpi b {
      display: block;
      margin: 14px 0 8px;
      font-size: 30px;
      letter-spacing: -.06em;
    }

    .up { color: var(--green); font-weight: 950; }

    .sparkline {
      height: 34px;
      margin-top: 12px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(79,140,255,.12), rgba(53,217,255,.18)),
        repeating-linear-gradient(90deg, transparent 0 14px, rgba(255,255,255,.045) 15px 16px);
      position: relative;
      overflow: hidden;
    }

    .sparkline::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      top: 16px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--cyan), var(--purple));
      box-shadow: 0 0 20px rgba(53,217,255,.38);
    }

    .progress {
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      margin-top: 18px;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(360px, .88fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .lower-grid {
      display: grid;
      grid-template-columns: .92fr 1.05fr .95fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel {
      padding: 22px;
    }

    .panel-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .panel h2, .panel h3 {
      margin: 0;
      letter-spacing: -.04em;
    }

    .panel p, .muted {
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line2);
      background: rgba(22,36,66,.72);
      color: var(--soft);
      border-radius: 999px;
      padding: 9px 13px;
      font-weight: 850;
      cursor: pointer;
    }

    .health {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 20px;
      align-items: center;
      margin-top: 18px;
    }

    .ring {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto;
      background:
        radial-gradient(circle, rgba(18,29,53,1) 0 55%, transparent 56%),
        conic-gradient(var(--green) 0 100%, rgba(255,255,255,.09) 0);
      box-shadow: 0 0 38px rgba(72,229,155,.18);
      text-align: center;
    }

    .ring b { font-size: 34px; }

    .list {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border: 1px solid rgba(148,163,184,.13);
      background: rgba(7,16,31,.36);
      border-radius: 15px;
      padding: 12px 14px;
    }

    code {
      background: rgba(53,217,255,.08);
      border: 1px solid rgba(53,217,255,.15);
      color: #bff2ff;
      border-radius: 8px;
      padding: 3px 7px;
    }

    .chart {
      min-height: 296px;
      display: flex;
      align-items: end;
      gap: 8px;
      padding: 18px 4px 4px;
      border-top: 1px solid rgba(148,163,184,.12);
      margin-top: 16px;
    }

    .bar {
      flex: 1;
      min-height: 28px;
      border-radius: 999px 999px 6px 6px;
      background: linear-gradient(180deg, var(--purple), rgba(139,92,246,.18));
      box-shadow: 0 0 22px rgba(139,92,246,.18);
    }

    .bar.alt { background: linear-gradient(180deg, var(--orange), rgba(255,159,67,.14)); }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      background: rgba(18,29,53,.62);
    }

    .status-strip div {
      color: var(--muted);
      font-size: 13px;
    }

    .status-strip b {
      display: block;
      margin-top: 5px;
      font-size: 15px;
      color: var(--text);
    }

    .page-title {
      margin: 0 0 8px;
      font-size: clamp(34px, 4vw, 54px);
      letter-spacing: -.06em;
    }

    .simple-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 18px;
    }

    .simple-card {
      min-height: 180px;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
      background: rgba(18,29,53,.72);
      box-shadow: var(--shadow);
    }

    .simple-card h3 { margin: 0 0 10px; }
    .simple-card p { color: var(--muted); line-height: 1.55; }

    @media (max-width: 1240px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .main-grid, .lower-grid { grid-template-columns: 1fr; }
      .hero-art { display: none; }
      .status-strip { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .topbar { grid-template-columns: 1fr; height: auto; padding: 14px; }
      .top-actions { justify-content: flex-start; flex-wrap: wrap; }
    }

    @media (max-width: 720px) {
      .kpi-grid, .simple-grid { grid-template-columns: 1fr; }
      .health { grid-template-columns: 1fr; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="brand" href="/console">
        <span class="logo">G</span>
        <span><strong>GoodOS Cloud</strong><span>Backend hosting console</span></span>
      </a>

      <div class="org">
        <div class="org-icon">G</div>
        <div><strong>GoodOS Inc.</strong><span>Enterprise Plan</span></div>
      </div>

      <div class="nav-section">
        <div class="nav-title">Overview</div>
        <button class="nav-btn active" type="button" data-view="overview"><span class="nav-icon">◉</span> Overview</button>
        <button class="nav-btn" type="button" data-view="projects"><span class="nav-icon">▣</span> Projects</button>
      </div>

      <div class="nav-section">
        <div class="nav-title">Build</div>
        <button class="nav-btn" type="button" data-view="database"><span class="nav-icon">▦</span> Database</button>
        <button class="nav-btn" type="button" data-view="auth"><span class="nav-icon">♙</span> Auth</button>
        <button class="nav-btn" type="button" data-view="storage"><span class="nav-icon">▤</span> Storage</button>
        <button class="nav-btn" type="button" data-view="realtime"><span class="nav-icon">✦</span> Realtime</button>
        <button class="nav-btn" type="button" data-view="functions"><span class="nav-icon">⌘</span> Functions</button>
        <button class="nav-btn" type="button" data-view="jobs"><span class="nav-icon">⚙</span> Jobs</button>
      </div>

      <div class="nav-section">
        <div class="nav-title">Operate</div>
        <button class="nav-btn" type="button" data-view="logs"><span class="nav-icon">☷</span> Logs</button>
        <button class="nav-btn" type="button" data-view="monitoring"><span class="nav-icon">◌</span> Monitoring</button>
        <button class="nav-btn" type="button" data-view="alerts"><span class="nav-icon">△</span> Alerts</button>
        <button class="nav-btn" type="button" data-view="backups"><span class="nav-icon">◈</span> Backups</button>
      </div>

      <div class="nav-section">
        <div class="nav-title">Governance</div>
        <button class="nav-btn" type="button" data-view="secrets"><span class="nav-icon">◇</span> Secrets</button>
        <button class="nav-btn" type="button" data-view="team"><span class="nav-icon">☻</span> Team</button>
        <button class="nav-btn" type="button" data-view="api-keys"><span class="nav-icon">⌁</span> API Keys</button>
      </div>

      <div class="nav-section">
        <div class="nav-title">Billing & Settings</div>
        <button class="nav-btn" type="button" data-view="billing"><span class="nav-icon">▥</span> Billing</button>
        <button class="nav-btn" type="button" data-view="settings"><span class="nav-icon">⚙</span> Settings</button>
      </div>

      <div class="help">
        <strong>Need help?</strong>
        <p>Visit docs, review API references, or contact support.</p>
        <a class="btn" href="/docs">View Documentation</a>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search">
          <span>⌘</span>
          <input id="globalSearch" placeholder="Search projects, resources, docs..." />
        </div>

        <div class="top-actions">
          <span class="pill">GoodOS Platform</span>
          <span class="pill"><span class="dot"></span> Production</span>
          <span class="pill">Usage 74%</span>
          <span class="pill">🔔 3</span>
          <button class="create" type="button" id="createProjectBtn">+ Create Project</button>
          <div class="avatar">MG</div>
        </div>
      </header>

      <section class="content" id="appView">
        <noscript>
          <div class="panel">
            <h1>JavaScript is required for the GoodOS Cloud Console.</h1>
            <p>Please enable JavaScript and refresh.</p>
          </div>
        </noscript>
      </section>
    </main>
  </div>

  <script src="/console-v2.js"></script>
</body>
</html>
