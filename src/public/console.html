<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GoodOS Cloud Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #07080d;
      --panel: #10131b;
      --panel2: #151923;
      --border: rgba(255,255,255,.08);
      --muted: #8b90a0;
      --text: #f5f7fb;
      --green: #22c55e;
      --indigo: #7367ff;
      --cyan: #22d3ee;
      --red: #fb7185;
      --amber: #fbbf24;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 10%, rgba(115,103,255,.18), transparent 32%),
        radial-gradient(circle at 86% 4%, rgba(34,211,238,.08), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input { font: inherit; }

    .hidden { display: none !important; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(8,10,16,.82);
      padding: 22px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 10px 24px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--indigo), #4f46e5);
      box-shadow: 0 20px 50px rgba(115,103,255,.25);
      font-weight: 950;
    }

    .brand h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: -.04em;
    }

    .brand p {
      font-size: 12px;
      margin: 2px 0 0;
      color: var(--muted);
    }

    .nav-section { margin-top: 22px; }

    .nav-title {
      font-size: 10px;
      font-weight: 900;
      color: #626878;
      letter-spacing: .22em;
      text-transform: uppercase;
      padding: 0 10px;
      margin-bottom: 8px;
    }

    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: #a8adbd;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: .16s ease;
      font-weight: 800;
      font-size: 14px;
    }

    .nav button:hover,
    .nav button.active {
      background: rgba(115,103,255,.16);
      color: white;
    }

    main { min-width: 0; }

    .topbar {
      height: 72px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: rgba(7,8,13,.72);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .search {
      width: min(620px, 52vw);
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--muted);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: white;
    }

    .session {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      padding: 8px 12px;
      color: #c7cbda;
      font-size: 12px;
      font-weight: 900;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 8px;
      box-shadow: 0 0 20px rgba(34,197,94,.55);
    }

    .logout {
      border: 1px solid rgba(251,113,133,.25);
      background: rgba(251,113,133,.08);
      color: #fecdd3;
      padding: 9px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 950;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .content { padding: 32px; }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    .hero h2 {
      font-size: 34px;
      margin: 0;
      letter-spacing: -.05em;
    }

    .hero p {
      color: var(--muted);
      margin: 8px 0 0;
      max-width: 760px;
      line-height: 1.6;
      font-size: 15px;
    }

    .grid { display: grid; gap: 18px; }
    .cards { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .two { grid-template-columns: 1.25fr .75fr; margin-top: 18px; }
    .module-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card, .module {
      background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 24px 70px rgba(0,0,0,.18);
    }

    .card .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .16em;
    }

    .card .value {
      font-size: 32px;
      font-weight: 950;
      margin-top: 8px;
      letter-spacing: -.04em;
    }

    .card .sub {
      color: #737988;
      font-size: 12px;
      margin-top: 4px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .section-head h3 {
      margin: 0;
      font-size: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      color: #747b8c;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 10px;
      text-align: left;
      padding: 13px 12px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      color: #d7dae5;
      font-size: 13px;
      vertical-align: top;
    }

    tr:hover td { background: rgba(255,255,255,.025); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(34,197,94,.1);
      color: #86efac;
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .badge.next {
      background: rgba(34,211,238,.1);
      color: #67e8f9;
    }

    .badge.warn {
      background: rgba(251,191,36,.1);
      color: #fde68a;
    }

    .muted { color: var(--muted); }

    .module h4 {
      margin: 0 0 8px;
      font-size: 17px;
    }

    .module p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .module .tag {
      margin-top: 16px;
      color: var(--cyan);
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .14em;
    }

    .codebox {
      max-height: 440px;
      overflow: auto;
      background: rgba(0,0,0,.28);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #b8bdcc;
      white-space: pre-wrap;
    }

    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 28px 90px rgba(0,0,0,.42);
    }

    .login-card h1 {
      margin: 16px 0 0;
      font-size: 30px;
      letter-spacing: -.04em;
    }

    .login-card p {
      color: var(--muted);
      line-height: 1.6;
    }

    label {
      color: #9aa1b3;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-weight: 950;
      display: block;
      margin: 18px 0 8px;
    }

    .login input {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.22);
      color: white;
      padding: 14px;
      border-radius: 14px;
      outline: none;
    }

    .primary {
      width: 100%;
      border: 0;
      background: var(--indigo);
      color: white;
      margin-top: 20px;
      padding: 14px;
      border-radius: 14px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .12em;
      cursor: pointer;
    }

    .error {
      background: rgba(251,113,133,.1);
      border: 1px solid rgba(251,113,133,.25);
      color: #fecdd3;
      padding: 12px;
      border-radius: 14px;
      margin-top: 16px;
      display: none;
      font-size: 13px;
    }

    @media (max-width: 1050px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .cards, .two, .module-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
      .content { padding: 20px; }
      .search { display: none; }
    }
  </style>

<script>
const state = {
  user: null,
  overview: {},
  apps: [],
  users: [],
  tables: [],
  memberships: [],
  logs: [],
  backups: [],
  security: {},
  apiKeys: [],
  webhooks: [],
  webhookDeliveries: [],
  buckets: [],
  events: [],
  view: "dashboard",
};

async function request(path, options = {}) {
  const response = await fetch(path, {
    ...options,
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      ...(options.headers || {})
    }
  });

  const data = await response.json().catch(() => ({}));

  if (!response.ok || data.success === false) {
    throw new Error(data.message || "Request failed");
  }

  return data;
}

function safeText(value) {
  return String(value ?? "").replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));
}

async function checkSession() {
  try {
    const data = await request("/api/auth/me");
    state.user = data.user;
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("userPill").textContent = state.user.displayName || state.user.email;

    try {
      await loadData();
    } catch (dataError) {
      console.error("Console data load failed:", dataError);
      state.overview = {
        status: "data-error",
        environment: "production",
        version: "1.0.0",
        stats: {},
        runtime: {},
        error: dataError.message || "Console data failed to load."
      };
    }

    render();
  } catch (authError) {
    console.error("Auth check failed:", authError);
    document.getElementById("app").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
  }
}

async function loadData() {
  try {
    const dashboardPayload = await request("/api/admin/dashboard-real-page-data");
    const dashboardData = dashboardPayload.data || dashboardPayload;
    const counts = dashboardData.counts || {};
    const runtime = dashboardData.runtime || {};

    state.overview = {
      status: "operational",
      environment: runtime.environment || "production",
      version: runtime.version || "1.0.0",
      runtime: {
        node: runtime.node || "-",
        uptimeFormatted: runtime.uptime || "-",
        uptimeSeconds: runtime.uptimeSeconds || 0,
        memoryMb: {
          heapUsed: runtime.memoryHeapMb || "-"
        }
      },
      stats: {
        users: counts.users || 0,
        activeApps: counts.activeApps || 0,
        activeMemberships: counts.activeMemberships || 0,
        sessions: counts.sessions || 0,
        apiKeys: counts.apiKeys || 0,
        webhooks: counts.webhooks || 0,
        buckets: counts.storageBuckets || 0,
        files: counts.storageFiles || 0
      }
    };

    state.apps = Array.isArray(dashboardData.apps) ? dashboardData.apps : [];
    state.users = Array.isArray(dashboardData.users) ? dashboardData.users : [];
    state.memberships = Array.isArray(dashboardData.memberships) ? dashboardData.memberships : [];
    state.sessions = Array.isArray(dashboardData.sessions) ? dashboardData.sessions : [];
    state.tables = Array.isArray(state.tables) ? state.tables : [];
    state.logs = Array.isArray(state.logs) ? state.logs : [];
    state.backups = Array.isArray(state.backups) ? state.backups : [];
    state.security = state.security || {};
    state.events = Array.isArray(state.events) ? state.events : [];

    try {
      const apiPayload = await request("/api/admin/api-keys-page-data");
      const apiData = apiPayload.data || apiPayload;
      state.apiKeys = Array.isArray(apiData.apiKeys) ? apiData.apiKeys : [];
    } catch (error) {
      state.apiKeys = Array.isArray(state.apiKeys) ? state.apiKeys : [];
    }

    try {
      const storagePayload = await request("/api/admin/storage-page-data");
      const storageData = storagePayload.data || storagePayload;
      state.buckets = Array.isArray(storageData.buckets) ? storageData.buckets : [];
      state.storageBuckets = state.buckets;
      state.storageFiles = Array.isArray(storageData.files) ? storageData.files : [];
      state.storageSignedUrls = Array.isArray(storageData.signedUrls) ? storageData.signedUrls : [];
    } catch (error) {
      state.buckets = Array.isArray(state.buckets) ? state.buckets : [];
      state.storageFiles = Array.isArray(state.storageFiles) ? state.storageFiles : [];
      state.storageSignedUrls = Array.isArray(state.storageSignedUrls) ? state.storageSignedUrls : [];
    }

    try {
      const webhookPayload = await request("/api/admin/webhooks-page-data");
      const webhookData = webhookPayload.data || webhookPayload;
      state.webhooks = Array.isArray(webhookData.webhooks) ? webhookData.webhooks : [];
      state.webhookDeliveries = Array.isArray(webhookData.webhookDeliveries) ? webhookData.webhookDeliveries : [];
    } catch (error) {
      state.webhooks = Array.isArray(state.webhooks) ? state.webhooks : [];
      state.webhookDeliveries = Array.isArray(state.webhookDeliveries) ? state.webhookDeliveries : [];
    }
  } catch (error) {
    console.error("Real dashboard data load failed:", error);
    state.overview = {
      status: "data-error",
      environment: "production",
      version: "1.0.0",
      stats: {},
      runtime: {},
      error: error.message || "Real dashboard data failed to load."
    };
  }
}



function goodosRenderNow() {
  if (typeof render === "function") {
    return render();
  }

  const view = document.getElementById("view");
  if (!view || !state) return;

  if (state.view === "dashboard") view.innerHTML = dashboard();
  else if (state.view === "auth") view.innerHTML = usersView();
  else if (state.view === "apps") view.innerHTML = appsView();
  else if (state.view === "database") view.innerHTML = databaseView();
  else if (state.view === "storage" || state.view === "storage-files") view.innerHTML = storageView();
  else if (state.view === "api") view.innerHTML = apiKeysView();
  else if (state.view === "webhooks") view.innerHTML = webhooksView();
  else if (state.view === "realtime") view.innerHTML = realtimeView();
  else if (state.view === "functions") view.innerHTML = functionsView();
  else if (state.view === "logs") view.innerHTML = logsView();
  else if (state.view === "security") view.innerHTML = securityView();
  else if (state.view === "backups") view.innerHTML = backupsView();
  else if (state.view === "settings") view.innerHTML = settingsView();
}

window.goodosRenderNow = goodosRenderNow;

function card(label, value, sub = "") {
  return '<div class="card"><div class="label">' + label + '</div><div class="value">' + safeText(value) + '</div><div class="sub">' + safeText(sub) + '</div></div>';
}

function hero(title, body, badge = "") {
  return '<div class="hero"><div><h2>' + title + '</h2><p>' + body + '</p></div>' + (badge ? '<div class="pill"><span class="status-dot"></span>' + badge + '</div>' : '') + '</div>';
}

function appsTable() {
  return `
    <table>
      <thead><tr><th>App</th><th>Domain</th><th>Status</th><th>Members</th></tr></thead>
      <tbody>
        ${state.apps.map(app => `
          <tr>
            <td><strong>${safeText(app.name)}</strong><div class="muted">${safeText(app.id)}</div></td>
            <td>${safeText(app.domain || "-")}</td>
            <td><span class="badge">${safeText(app.status || "active")}</span></td>
            <td>${safeText(app.memberCount ?? "-")}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}



window.loadProjectControlCenter = async function loadProjectControlCenter() {
  try {
    const response = await fetch("/api/admin/projects-page-data?t=" + Date.now(), {
      method: "GET",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json" }
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Project Control Center failed with status " + response.status);
    }

    const data = payload.data || payload;
    state.projectCenter = data || {};
    state.organizations = Array.isArray(data.organizations) ? data.organizations : [];
    state.projects = Array.isArray(data.projects) ? data.projects : [];
    state.projectEnvironments = Array.isArray(data.environments) ? data.environments : [];
    state.projectModuleMappings = Array.isArray(data.moduleMappings) ? data.moduleMappings : [];
    state.projectCenterCounts = data.counts || {};
    state.projectCenterLoaded = true;
    state.projectCenterLoading = false;
    state.projectCenterError = "";

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  } catch (error) {
    state.projectCenterLoaded = true;
    state.projectCenterLoading = false;
    state.projectCenterError = error.message || "Failed to load Project Control Center.";
    console.error("Project Control Center failed:", error);

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  }
};

window.refreshProjectControlCenterNow = async function refreshProjectControlCenterNow() {
  state.projectCenterLoaded = false;
  state.projectCenterLoading = true;
  if (typeof goodosRenderNow === "function") goodosRenderNow();
  else if (typeof render === "function") render();
  return window.loadProjectControlCenter();
};

window.createProjectControlProject = async function createProjectControlProject() {
  const name = prompt("Project name:", "New GoodOS Project");
  if (!name) return;

  const slug = prompt("Project slug:", name.toLowerCase().replace(/[^a-z0-9_-]/g, "-")) || "";
  const description = prompt("Description:", "GoodOS project.") || "";

  try {
    const response = await fetch("/api/admin/projects/create-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        organizationId: "org_goodos",
        name,
        slug,
        description,
        status: "active"
      })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Project creation failed with status " + response.status);
    }

    alert("Project created with default Production environment.");
    await window.loadProjectControlCenter();
    await window.loadActivityCenter();
  } catch (error) {
    alert("Project creation failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.createProjectEnvironment = async function createProjectEnvironment(projectId) {
  const name = prompt("Environment name:", "Staging");
  if (!name) return;

  const type = prompt("Type: development, staging, production, preview, test", name.toLowerCase()) || "staging";
  const slug = prompt("Slug:", type.toLowerCase().replace(/[^a-z0-9_-]/g, "-")) || type;

  try {
    const response = await fetch("/api/admin/projects/" + encodeURIComponent(projectId) + "/environments/create-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        type,
        slug,
        status: "active",
        apiBaseUrl: "https://backend.goodos.app"
      })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Environment creation failed with status " + response.status);
    }

    alert("Environment created.");
    await window.loadProjectControlCenter();
  } catch (error) {
    alert("Environment creation failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.viewProjectDetail = async function viewProjectDetail(id) {
  try {
    const response = await fetch("/api/admin/projects/" + encodeURIComponent(id) + "/detail-safe?t=" + Date.now(), {
      method: "GET",
      credentials: "include",
      cache: "no-store",

    if (!response.ok || payload.success === false) {

  } catch (error) {

  }
};

function projectControlCenterSection() {
  if (!state.projectCenterLoaded && !state.projectCenterLoading) {
    state.projectCenterLoading = true;
    setTimeout(() => window.loadProjectControlCenter(), 100);
  }

  const organizations = Array.isArray(state.organizations) ? state.organizations : [];
  const projects = Array.isArray(state.projects) ? state.projects : [];
  const environments = Array.isArray(state.projectEnvironments) ? state.projectEnvironments : [];
  const mappings = Array.isArray(state.projectModuleMappings) ? state.projectModuleMappings : [];
  const counts = state.projectCenterCounts || {};
  const scopedPercent = counts.totalModules ? Math.round((Number(counts.scopedModules || 0) / Number(counts.totalModules || 1)) * 100) : 0;

  return `
    <div class="section-head" style="margin-top:18px;">
      <h3>Project Control Center</h3>
      <div>
        <button class="logout" onclick="window.refreshProjectControlCenterNow()">Refresh Projects</button>
        <button class="logout" onclick="window.createProjectControlProject()">Create Project</button>
      </div>
    </div>

    ${state.projectCenterLoading ? `<div class="card" style="margin-bottom:18px;"><p class="muted">Loading Project Control Center...</p></div>` : ""}
    ${state.projectCenterError ? `<div class="card" style="margin-bottom:18px;"><p class="muted">Project Control Center error: ${safeText(state.projectCenterError)}</p></div>` : ""}

    <div class="grid cards" style="margin-top:18px;">
      ${card("Organizations", counts.organizations ?? organizations.length, "Enterprise tenants")}
      ${card("Projects", counts.projects ?? projects.length, "Project workspaces")}
      ${card("Environments", counts.environments ?? environments.length, "Dev / staging / production")}
      ${card("Module Scope", `${safeText(String(scopedPercent))}%`, "Records mapped to environments")}
    </div>

    <div class="grid two" style="margin-top:18px;">
      <div class="card">
        <div class="section-head"><h3>Projects</h3><span class="badge">${safeText(String(projects.length))} Projects</span></div>
        <table>
          <thead>
            <tr>
              <th>Project</th>
              <th>Organization</th>
              <th>Status</th>
              <th>Envs</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${projects.map(project => `
              <tr>
                <td><strong>${safeText(project.name || project.id)}</strong><div class="muted">${safeText(project.id || "")}</div><div class="muted">${safeText(project.description || "")}</div></td>
                <td>${safeText(project.organizationName || project.organizationId || "-")}</td>
                <td><span class="badge">${safeText(project.status || "-")}</span></td>
                <td>${safeText(String(project.environmentCount ?? 0))}</td>
                <td>
                  <button class="logout" onclick="window.viewProjectDetail('${safeText(project.id)}')">Details</button>
                  <button class="logout" onclick="window.createProjectEnvironment('${safeText(project.id)}')">Add Env</button>
                </td>
              </tr>
            `).join("") || '<tr><td colspan="5" class="muted">No projects found.</td></tr>'}
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="section-head"><h3>Environments</h3><span class="badge">${safeText(String(environments.length))} Environments</span></div>
        <table>
          <thead>
            <tr>
              <th>Environment</th>
              <th>Project</th>
              <th>Type</th>
              <th>Modules</th>
            </tr>
          </thead>
          <tbody>
            ${environments.map(env => `
              <tr>
                <td><strong>${safeText(env.name || env.id)}</strong><div class="muted">${safeText(env.id || "")}</div></td>
                <td>${safeText(env.projectName || env.projectId || "-")}</td>
                <td><span class="badge">${safeText(env.type || "-")}</span></td>
                <td>${safeText(String(env.apps || 0))} apps / ${safeText(String(env.apiKeys || 0))} keys / ${safeText(String(env.webhooks || 0))} hooks</td>
              </tr>
            `).join("") || '<tr><td colspan="4" class="muted">No environments found.</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="section-head"><h3>Module Environment Mapping</h3><span class="badge">${safeText(String(scopedPercent))}% Scoped</span></div>
      <table>
        <thead>
          <tr>
            <th>Module</th>
            <th>Total Records</th>
            <th>Environment Scoped</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${mappings.map(item => {
            const total = Number(item.count || 0);
            const scoped = Number(item.scopedCount || 0);
            return `
              <tr>
                <td><strong>${safeText(item.module || "-")}</strong></td>
                <td>${safeText(String(total))}</td>
                <td>${safeText(String(scoped))}</td>
                <td><span class="badge">${total === scoped ? "Scoped" : "Partial"}</span></td>
              </tr>
            `;
          }).join("") || '<tr><td colspan="4" class="muted">No module mapping data loaded.</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}

window.loadActivityCenter = async function loadActivityCenter() {

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();

window.refreshActivityCenterNow = async function refreshActivityCenterNow() {
  state.activityLoaded = false;
  state.activityLoading = true;
  if (typeof goodosRenderNow === "function") goodosRenderNow();
  else if (typeof render === "function") render();
  return window.loadActivityCenter();
};

window.runGlobalSearch = async function runGlobalSearch(query) {
  const q = String(query ?? state.globalSearchQuery ?? "").trim();
  state.globalSearchQuery = q;

  if (!q || q.length < 2) {
    state.globalSearchResults = [];
    state.globalSearchLoaded = true;
    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
    return;
  }

  try {
    const response = await fetch("/api/admin/global-search-safe?q=" + encodeURIComponent(q) + "&limit=12&t=" + Date.now(), {
      method: "GET",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json" }
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Search failed with status " + response.status);
    }

    const data = payload.data || payload;
    state.globalSearchResults = Array.isArray(data.results) ? data.results : [];
    state.globalSearchLoaded = true;
    state.globalSearchError = "";

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  } catch (error) {
    state.globalSearchError = error.message || "Search failed.";
    console.error("Global search failed:", error);
    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();

window.loadPolicyRulesCenter = async function loadPolicyRulesCenter() {
  try {
    const response = await fetch("/api/admin/policy-rules-page-data?t=" + Date.now(), {
      method: "GET",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json" }
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Policy Rules load failed with status " + response.status);
    }

    const data = payload.data || payload;
    state.policyRules = Array.isArray(data.rules) ? data.rules : [];
    state.policyEvaluations = Array.isArray(data.evaluations) ? data.evaluations : [];
    state.policySummary = Array.isArray(data.summary) ? data.summary : [];
    state.policyCounts = data.counts || {};
    state.policyRulesLoaded = true;
    state.policyRulesLoading = false;
    state.policyRulesError = "";

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  } catch (error) {
    state.policyRulesLoaded = true;
    state.policyRulesLoading = false;
    state.policyRulesError = error.message || "Failed to load Policy Rules.";
    console.error("Policy Rules load failed:", error);

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  }
};

window.createPolicyRule = async function createPolicyRule() {
  const name = prompt("Policy name:", "New GoodOS Policy");
  if (!name) return;

  const targetType = prompt("Target type: db_api, storage, function, webhook, admin, realtime, *", "db_api") || "db_api";
  const targetId = prompt("Target id or *:", "*") || "*";
  const operation = prompt("Operation: read, insert, update, delete, execute, admin, *", "read") || "read";
  const effect = prompt("Effect: allow or deny", "allow") || "allow";
  const priority = Number(prompt("Priority. Lower runs first:", "100") || 100);
  const conditionInput = prompt("Condition JSON:", JSON.stringify({ requiredScopes: ["read:db"] }, null, 2));
  if (conditionInput === null) return;

  let conditionJson = {};
  try {
    conditionJson = JSON.parse(conditionInput || "{}");
  } catch (error) {
    return alert("Invalid condition JSON.");
  }

  try {
    const response = await fetch("/api/admin/policy-rules/create-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        targetType,
        targetId,
        operation,
        effect,
        priority,
        conditionJson,
        status: "active",
        message: "Policy created from GoodOS Cloud Console."
      })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Policy creation failed with status " + response.status);
    }

    alert("Policy rule created.");
    await window.loadPolicyRulesCenter();
  } catch (error) {
    alert("Policy rule creation failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.editPolicyRule = async function editPolicyRule(id) {
  const rule = (state.policyRules || []).find(item => item.id === id);
  if (!rule) return alert("Policy rule not found.");

  const current = {
    name: rule.name || "",
    description: rule.description || "",
    targetType: rule.targetType || "db_api",
    targetId: rule.targetId || "*",
    operation: rule.operation || "*",
    effect: rule.effect || "allow",
    priority: rule.priority || 100,
    conditionJson: rule.conditionJson || {},
    message: rule.message || "",
    status: rule.status || "active"
  };

  const input = prompt("Edit Policy Rule JSON:", JSON.stringify(current, null, 2));
  if (input === null) return;

  let patch;
  try {
    patch = JSON.parse(input);
  } catch (error) {
    return alert("Invalid JSON.");
  }

  try {
    const response = await fetch("/api/admin/policy-rules/" + encodeURIComponent(id) + "/update-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(patch)
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Policy update failed with status " + response.status);
    }

    alert("Policy rule updated.");
    await window.loadPolicyRulesCenter();
  } catch (error) {
    alert("Policy rule update failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.loadDatabaseTableRows = async function loadDatabaseTableRows(tableName, offset = 0) {
  if (!tableName) return alert("Missing table name.");

  const searchInput = document.getElementById("database-row-search");
  const search = searchInput ? searchInput.value.trim() : (state.databaseRowSearch || "");

  state.selectedDbTable = tableName;
  state.databaseRowSearch = search;
  state.databaseRowsLoading = true;
  state.databaseRowsError = "";
  if (typeof goodosRenderNow === 'function') goodosRenderNow(); else if (typeof render === 'function') render();

  try {
    const response = await fetch(
      "/api/admin/database/tables/" + encodeURIComponent(tableName) + "/rows?limit=25&offset=" + encodeURIComponent(offset) + "&search=" + encodeURIComponent(search),
      {
        method: "GET",
        credentials: "include",
        cache: "no-store",
        headers: { "Accept": "application/json" }
      }
    );

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Table row load failed with status " + response.status);
    }

    const data = payload.data || payload;
    state.selectedDbTable = data.tableName || tableName;
    state.selectedDbColumns = Array.isArray(data.columns) ? data.columns : [];
    state.selectedDbRows = Array.isArray(data.rows) ? data.rows : [];
    state.selectedDbPagination = data.pagination || {};
    state.databaseRowsLoading = false;
    state.databaseRowsError = "";
    if (typeof goodosRenderNow === 'function') goodosRenderNow(); else if (typeof render === 'function') render();
  } catch (error) {
    state.databaseRowsLoading = false;
    state.databaseRowsError = error.message || "Failed to load table rows.";
    alert("Database row load failed: " + state.databaseRowsError);
    console.error(error);
    if (typeof goodosRenderNow === 'function') goodosRenderNow(); else if (typeof render === 'function') render();
  }
};

window.parseDatabasePromptValue = function parseDatabasePromptValue(value) {
  if (value === null) return null;
  const trimmed = String(value).trim();

  if (trimmed === "") return "";
  if (trimmed === "null") return null;
  if (trimmed === "true") return true;
  if (trimmed === "false") return false;
  if (!Number.isNaN(Number(trimmed)) && trimmed !== "") return Number(trimmed);

  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    try {
      return JSON.parse(trimmed);
    } catch (error) {
      return value;
    }
  }

  return value;
};

window.insertDatabaseRow = async function insertDatabaseRow() {
  if (!state.selectedDbTable) return alert("Select a table first.");

  const jsonText = prompt(
    "Enter row JSON. Example: {\"name\":\"Test\",\"status\":\"active\"}",
    "{}"
  );

  if (jsonText === null) return;

  let row;

  try {
    row = JSON.parse(jsonText);
  } catch (error) {
    alert("Invalid JSON.");
    return;
  }

  if (!row || typeof row !== "object" || Array.isArray(row)) {
    alert("Row must be a JSON object.");
    return;
  }

  const confirmed = confirm("Insert this row into " + state.selectedDbTable + "?");
  if (!confirmed) return;

  try {
    const response = await fetch("/api/admin/database/tables/" + encodeURIComponent(state.selectedDbTable) + "/rows/create-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ row })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Row insert failed with status " + response.status);
    }

window.editSecuritySetting = async function editSecuritySetting(id, label, currentValue, valueType) {
  if (!id) return alert("Missing setting id.");

  const nextValueText = prompt("New value for " + (label || "setting") + ":", currentValue ?? "");
  if (nextValueText === null) return;

  let value = nextValueText;

  if (String(valueType || "").toLowerCase() === "boolean") {
    value = ["true", "1", "yes", "on", "enabled", "active"].includes(String(nextValueText).toLowerCase());
  } else if (String(valueType || "").toLowerCase() === "number") {
    value = Number(nextValueText || 0);
  } else if (String(valueType || "").toLowerCase() === "json") {
    try {
      value = JSON.parse(nextValueText || "{}");
    } catch {
      alert("Invalid JSON value.");
      return;
    }
  }

  try {
    const response = await fetch("/api/admin/security/settings/" + encodeURIComponent(id) + "/update-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ value })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Security setting update failed with status " + response.status);
    }

    alert("Security setting updated.");
    await window.loadLiveSecurity();
  } catch (error) {
    alert("Security setting update failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.editPlatformSetting = async function editPlatformSetting(settingKey, currentValue) {
  if (!settingKey) return alert("Missing setting key.");

  const nextValue = prompt("New value for " + settingKey + ":", currentValue ?? "");
  if (nextValue === null) return;

  let parsedValue = nextValue;

  if (nextValue === "true") parsedValue = true;
  else if (nextValue === "false") parsedValue = false;
  else if (!Number.isNaN(Number(nextValue)) && nextValue.trim() !== "") parsedValue = Number(nextValue);
  else if (nextValue.trim().startsWith("[") || nextValue.trim().startsWith("{")) {
    try {
      parsedValue = JSON.parse(nextValue);
    } catch (error) {
      alert("Invalid JSON value.");
      return;
    }
  }

  try {
    const response = await fetch("/api/admin/settings/update-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        settingKey,
        value: parsedValue
      })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Setting update failed with status " + response.status);
    }

    alert("Setting updated.");
    await window.loadLiveSettings();
  } catch (error) {
    alert("Setting update failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.createSecretsV2Secret = async function createSecretsV2Secret(defaultKey) {
  try {
    const secretKey = prompt("Secret key:", defaultKey || "SMTP_HOST");
    if (!secretKey) return;

    const secretValue = prompt("Secret value. It will be encrypted and not shown again:", "");
    if (!secretValue) return;

    const category = prompt("Category:", secretKey.startsWith("SMTP") || secretKey.startsWith("MAIL") ? "email" : "general") || "general";

    const response = await fetch("/api/admin/secrets/create-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json", "Content-Type": "application/json" },
      body: JSON.stringify({
        secretKey,
        secretValue,
        displayName: secretKey,
        category,
        description: "Created from Secrets V2 console."
      })
    });

    const payload = await response.json().catch(() => ({}));
    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Create secret failed with status " + response.status);
    }

    alert("Secret saved. Raw value was encrypted and will not be shown again.");
    await window.loadSecretsV2Center();
  } catch (error) {
    alert("Create secret failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.uploadStorageFile = function uploadStorageFile(bucketId) {
  if (!bucketId) return alert("Missing bucket id.");

  const input = document.createElement("input");
  input.type = "file";
  input.multiple = false;

  input.onchange = async () => {
    const file = input.files && input.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    try {
      const response = await fetch("/api/admin/storage/buckets/" + encodeURIComponent(bucketId) + "/files", {
        method: "POST",
        credentials: "include",
        cache: "no-store",
        body: formData
      });

      const payload = await response.json().catch(() => ({}));

  const buckets = Array.isArray(state.storageBuckets) ? state.storageBuckets : (Array.isArray(state.buckets) ? state.buckets : []);
  const files = Array.isArray(state.storageFiles) ? state.storageFiles : [];
  const counts = state.storageCounts || {};
  const bucketStats = state.storageBucketStats || {};
  const selectedBucket = state.selectedStorageBucket || (buckets[0]?.id || "");
  const searchTerm = String(state.storageSearch || "").toLowerCase().trim();
  const selectedFolder = state.selectedStorageFolder || "";

  const filesForBucket = (bucketId) => files.filter(file => {
    return String(file.bucketId || file.bucket_id || "") === String(bucketId);
  });

  const bucketFolders = (bucketFiles) => {
    return Array.from(new Set(
      bucketFiles
        .map(file => file.folderPath || file.folder_path || "")
        .filter(Boolean)
    )).sort();
  };

  const filterFiles = (bucketFiles) => bucketFiles.filter(file => {
    const fileName = file.displayName || file.display_name || file.originalName || file.original_name || file.filename || file.fileName || file.file_name || file.name || file.id || "";
    const folderPath = file.folderPath || file.folder_path || "";
    const mimeType = file.mimeType || file.mime_type || file.type || "";
    const searchable = `${fileName} ${folderPath} ${mimeType}`.toLowerCase();

    const matchesSearch = !searchTerm || searchable.includes(searchTerm);
    const matchesFolder = !selectedFolder || folderPath === selectedFolder;

    return matchesSearch && matchesFolder;
  });

  const inlineFileManager = (bucket) => {
    const bucketId = bucket.id;
    if (selectedBucket !== bucketId) return "";

    const rawBucketFiles = filesForBucket(bucketId);
    const folders = bucketFolders(rawBucketFiles);
    const bucketFiles = filterFiles(rawBucketFiles);

    return `

                value="${safeText(state.storageSearch || "")}"
                oninput="window.setStorageSearch(this.value)"
                placeholder="Search files..."
                style="flex:1; min-width:240px; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:#fff;"
              />
              <button class="logout" onclick="window.filterStorageFolder('')">All Folders</button>
              ${folders.map(folder => `<button class="logout" onclick="window.filterStorageFolder('${safeText(folder)}')">${safeText(folder)}</button>`).join("")}
            </div>

            <div class="grid cards" style="margin-bottom:18px;">
              ${card("Files", bucketFiles.length, selectedFolder ? "Filtered folder files" : "Files in this bucket")}

window.loadLiveWebhooks = async function loadLiveWebhooks() {
  try {
    const response = await fetch("/api/admin/webhooks-page-data?t=" + Date.now(), {
      method: "GET",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json" }
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Webhook refresh failed with status " + response.status);
    }

    const data = payload.data || payload;
    state.webhooks = Array.isArray(data.webhooks) ? data.webhooks : [];
    state.webhookDeliveries = Array.isArray(data.deliveries) ? data.deliveries : (Array.isArray(data.webhookDeliveries) ? data.webhookDeliveries : []);
    state.webhookCounts = data.counts || {};

    try {
      const receiptsResponse = await fetch("/api/admin/webhook-test-receipts-page-data?t=" + Date.now(), {
        method: "GET",
        credentials: "include",
        cache: "no-store",
        headers: { "Accept": "application/json" }
      });

      const receiptsPayload = await receiptsResponse.json().catch(() => ({}));
      const receiptsData = receiptsPayload.data || receiptsPayload;
      state.webhookReceipts = Array.isArray(receiptsData.receipts) ? receiptsData.receipts : [];
      state.webhookReceiptCounts = receiptsData.counts || {};
    } catch (receiptError) {
      state.webhookReceipts = Array.isArray(state.webhookReceipts) ? state.webhookReceipts : [];
      state.webhookReceiptCounts = state.webhookReceiptCounts || {};
    }
    state.webhooksLoaded = true;
    state.webhooksLoading = false;
    state.webhooksError = "";

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  } catch (error) {
    state.webhooksLoading = false;
    state.webhooksError = error.message || "Failed to load webhooks.";
    alert("Webhook refresh failed: " + state.webhooksError);
    console.error(error);

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  }
};

window.createWebhook = async function createWebhook() {
  const name = prompt("Webhook name:", "New Webhook");
  if (!name) return;

  const url = prompt("Webhook URL:", "https://backend.goodos.app/webhook-test-receiver");
  if (!url) return;

  const eventsText = prompt("Events, comma-separated. Use * for all events:", "*") || "*";
  const events = eventsText.split(",").map(item => item.trim()).filter(Boolean);

  try {
    const response = await fetch("/api/admin/webhooks/create-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, url, events })
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Webhook creation failed with status " + response.status);
    }

    const data = payload.data || payload;
    const secret = data.secret || "";

    if (secret) {
      prompt("Webhook created. Copy this secret now. It will not be shown again:", secret);
    } else {
      alert("Webhook created.");
    }

    await window.loadLiveWebhooks();
  } catch (error) {
    alert("Webhook creation failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

window.editWebhookPolicy = async function editWebhookPolicy(id) {
  const webhook = (state.webhooks || []).find(item => item.id === id);
  if (!webhook) return alert("Webhook not found.");

  const policy = {
    name: webhook.name || "",
    url: webhook.url || "",
    description: webhook.description || "",
    events: webhook.events || ["*"],
    status: webhook.status || "active",
    deliveryTimeoutSeconds: Number(webhook.deliveryTimeoutSeconds || webhook.delivery_timeout_seconds || 15),
    maxRetries: Number(webhook.maxRetries || webhook.max_retries || 3),
    retryBackoffSeconds: Number(webhook.retryBackoffSeconds || webhook.retry_backoff_seconds || 300),
    signingAlgorithm: webhook.signingAlgorithm || webhook.signing_algorithm || "sha256"
  };

  const policyText = prompt("Edit webhook policy JSON:", JSON.stringify(policy, null, 2));
  if (policyText === null) return;

  let parsed;

  try {
    parsed = JSON.parse(policyText);
  } catch (error) {
    alert("Invalid webhook policy JSON.");
    return;
  }

  try {
    const response = await fetch("/api/admin/webhooks/" + encodeURIComponent(id) + "/policy/update-safe", {
      method: "POST",
      credentials: "include",
      cache: "no-store",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(parsed)
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok || payload.success === false) {
      throw new Error(payload.message || "Webhook policy update failed with status " + response.status);
    }

    alert("Webhook policy updated.");
    await window.loadLiveWebhooks();
  } catch (error) {
    alert("Webhook policy update failed: " + (error.message || "Unknown error"));
    console.error(error);
  }
};

function prettyJsonForAlert(value) {
  try {
    if (typeof value === "string") {
      try {
        return JSON.stringify(JSON.parse(value), null, 2);
      } catch {
        return value;
      }
    }

    return JSON.stringify(value || {}, null, 2);
  } catch {
    return String(value || "");
  }
}

window.connectRealtimeStream = function connectRealtimeStream() {
  const channel = prompt("Subscribe to channel. Use * for all channels:", state.realtimeSelectedChannel || "system");
  if (channel === null) return;

  if (state.realtimeEventSource) {
    try { state.realtimeEventSource.close(); } catch {}
    state.realtimeEventSource = null;
  }

  state.realtimeSelectedChannel = channel || "system";
  state.realtimeLiveStatus = "connecting";

  const source = new EventSource("/api/admin/realtime-events/stream-safe?channel=" + encodeURIComponent(state.realtimeSelectedChannel));

  source.addEventListener("connected", (event) => {
    state.realtimeLiveStatus = "connected";
    state.realtimeConnection = JSON.parse(event.data || "{}");
    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  });

  source.addEventListener("realtime", (event) => {
    const liveEvent = JSON.parse(event.data || "{}");
    state.realtimeEvents = [liveEvent, ...(Array.isArray(state.realtimeEvents) ? state.realtimeEvents : [])].slice(0, 250);
    state.realtimeLastEvent = liveEvent;
    state.realtimeLiveStatus = "receiving";

    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  });

  source.addEventListener("ping", () => {
    state.realtimeLastPing = new Date().toISOString();
  });

  source.onerror = function realtimeStreamError() {
    state.realtimeLiveStatus = "error-or-reconnecting";
    if (typeof goodosRenderNow === "function") goodosRenderNow();
    else if (typeof render === "function") render();
  };

  state.realtimeEventSource = source;

  if (typeof goodosRenderNow === "function") goodosRenderNow();
  else if (typeof render === "function") render();
};

window.disconnectRealtimeStream = function disconnectRealtimeStream() {
  if (state.realtimeEventSource) {
    try { state.realtimeEventSource.close(); } catch {}
  }

  state.realtimeEventSource = null;
  state.realtimeLiveStatus = "disconnected";
  state.realtimeConnection = null;

  if (typeof goodosRenderNow === "function") goodosRenderNow();
  else if (typeof render === "function") render();
};

  const eventsRaw = prompt("Events to send. Use * for all events, or comma-separated event names:", "*") || "*";
  const events = eventsRaw.split(",").map(item => item.trim()).filter(Boolean);

  try {

      method: "POST",

<script id="goodos-real-ui-premium-v27-js">
(function () {
  if (window.__goodosRealUIPremiumV27) return;

  function textOf(el) {
    return String(el && el.textContent || "").replace(/\s+/g, " ").trim();
  }

  function closestBlock(el) {
    let node = el;
    for (let i = 0; node && i < 8; i += 1, node = node.parentElement) {
      if (!node || node === document.body) break;
      const cls = String(node.className || "");
      if (
        node.tagName === "SECTION" ||
        cls.includes("card") ||
        cls.includes("panel") ||
        node.getAttribute("role") === "region"
      ) {
        return node;
      }
    }
    return el ? el.parentElement : null;
  }

  function findHeading(text) {
    const headings = Array.from(document.querySelectorAll("h1,h2,h3,h4,strong"));
    return headings.find((el) => textOf(el).toLowerCase().includes(text.toLowerCase()));
  }

  function tagCards() {
    const view = document.querySelector("#view") || document.querySelector("[data-view-root]") || document.querySelector("main");
    if (!view) return;

    document.body.classList.add("goodos-v27-active");

    const heroHeading = findHeading("Backend Console");
    const hero = closestBlock(heroHeading);
    if (hero && !hero.classList.contains("goodos-v27-hero")) {
      hero.classList.add("goodos-v27-hero");
      const art = document.createElement("div");
      art.className = "goodos-v27-hero-art";
      art.setAttribute("aria-hidden", "true");
      art.innerHTML = "<i></i><i></i><i></i>";
      hero.appendChild(art);
    }

    [
      "Activity Center",
      "Project Control Center",
      "Projects",
      "Environments",
      "Module Environment Mapping",
      "Storage",
      "Auth",
      "Realtime",
      "Functions",
      "Jobs",
      "Notifications",
      "Billing",
      "Secrets"
    ].forEach((label) => {
      const h = findHeading(label);
      const block = closestBlock(h);
      if (block) block.classList.add("goodos-v27-panel");
      if (h) h.classList.add("goodos-v27-section-title");
    });

    const allBlocks = Array.from(view.querySelectorAll("section, .card, .panel, [class*='card'], [class*='panel']"));
    allBlocks.forEach((block) => {
      if (block.closest("aside,nav,header")) return;
      block.classList.add("goodos-v27-card");
    });

    const statLabels = ["ORGANIZATIONS", "PROJECTS", "ENVIRONMENTS", "MODULE SCOPE"];
    const statBlocks = statLabels.map((label) => {
      const match = Array.from(view.querySelectorAll("*")).find((el) => {
        if (el.children.length > 2) return false;
        return textOf(el).toUpperCase() === label;
      });
      return closestBlock(match);
    }).filter(Boolean);

    const parentCounts = new Map();
    statBlocks.forEach((block) => {
      const parent = block.parentElement;
      if (!parent) return;
      parentCounts.set(parent, (parentCounts.get(parent) || 0) + 1);
    });

    parentCounts.forEach((count, parent) => {
      if (count >= 3) parent.classList.add("goodos-v27-stat-row");

      "Dashboard": "Overview",
      "App Registry": "Projects",
      "Database Browser": "Database",

      "Storage / Files": "Storage",
      "Realtime Events": "Realtime",
      "Edge Functions": "Functions",
      "Logs & Monitoring": "Logs",
      "Security Rules": "Alerts"

    Array.from(document.querySelectorAll("strong, span, small, h1, h2, h3, div, button"))
      .slice(0, 600)

        if (el.children.length) return;
        const text = textOf(el);
        if (map[text]) el.textContent = map[text];
      });

  function run() {

})();

          '<text x="42" y="40" text-anchor="middle" class="white" font-size="14" font-weight="900">' + v + '</text>' +

        '</svg>' +
      '</div>';
  }

  function projectsChart(value) {
    var v = Math.max(0, Number(value || 0));
    var d = "M0 44 L34 42 L68 43 L102 40 L136 42 L170 36 L204 38 L238 32 L272 28 L320 22";

  function moduleScopeChart(value) {

    var width = (pct * 3.0).toFixed(1);

  }

  function keyStatus(key) {
    return key.status ||
      (key.is_active === false ? "inactive" : "active");
  }

  function keyScope(key) {
    if (Array.isArray(key.scopes)) return key.scopes.join(", ");
    if (Array.isArray(key.permissions)) return key.permissions.join(", ");

    return key.scope ||
      key.permission ||
      key.type ||
      key.environment ||
      "scoped";
  }

  function keyCreated(key) {
    return key.created_at ||
      key.createdAt ||
      key.updated_at ||
      key.updatedAt ||
      "";
  }

  function renderRows(keys) {
    if (!keys.length) {
      return '' +
        '<tr>' +
          '<td colspan="5" class="goodos-api-keys-muted-v60">No API keys were returned from the live API key endpoint.</td>' +
        '</tr>';
    }

    return keys.map(function (key, index) {
      return '' +
        '<tr>' +
          '<td><strong>' + escapeHtml(keyName(key, index)) + '</strong><div class="goodos-api-keys-muted-v60">' + escapeHtml(key.id || key.key_id || "") + '</div></td>' +
          '<td><span class="goodos-api-keys-pill-v60">' + escapeHtml(keyStatus(key)) + '</span></td>' +
          '<td>' + escapeHtml(keyScope(key)) + '</td>' +
          '<td>' + escapeHtml(keyCreated(key)) + '</td>' +
          '<td><button class="goodos-api-keys-btn-v60" type="button">Details</button></td>' +
        '</tr>';
    }).join("");
  }

  function renderLoading() {
    markApiKeysActive();

    getRoot().innerHTML = '' +
      '<section class="goodos-api-keys-page-v60">' +
        '<div class="goodos-api-keys-hero-v60">' +
          '<h1>API Keys</h1>' +
          '<p>Loading live API key data...</p>' +
        '</div>' +
      '</section>';
  }

  async function renderApiKeysPage() {
    markApiKeysActive();
    renderLoading();

    var result = await fetchApiKeysData();
    var data = result.data || {};
    var keys = flattenKeys(data);

    var total = keys.length ||
      data.total ||
      data.count ||
      data.api_key_count ||
      0;

    var active = keys.filter(function (key) {
      return String(keyStatus(key)).toLowerCase() !== "inactive" &&
        String(keyStatus(key)).toLowerCase() !== "disabled" &&
        String(keyStatus(key)).toLowerCase() !== "revoked";
    }).length;

    var restricted = countRestricted(keys);

    var scopes = new Set();
    keys.forEach(function (key) {
      scopes.add(keyScope(key));
    });

    if (!keys.length && data.summary) {
      total = data.summary.total || data.summary.keys || total;
      active = data.summary.active || active;
      restricted = data.summary.restricted || restricted;
    }

    var errorHtml = result.error ? '<div class="goodos-api-keys-error-v60">Live API key data could not be loaded: ' + escapeHtml(result.error) + '</div>' : "";

    getRoot().innerHTML = '' +
      '<section class="goodos-api-keys-page-v60" data-goodos-real-api-keys-page-v60="true">' +
        '<div class="goodos-api-keys-hero-v60">' +
          '<h1>API Keys</h1>' +
          '<p>Manage GoodOS API keys, scoped access, restrictions, environments, and key audit readiness from one place.</p>' +
        '</div>' +

        '<div class="goodos-api-keys-section-head-v60">' +
          '<h2>API Key Control Center</h2>' +
          '<div class="goodos-api-keys-actions-v60">' +
            '<button class="goodos-api-keys-btn-v60" type="button" onclick="location.reload()">Refresh Data</button>' +
            '<button class="goodos-api-keys-btn-v60" type="button">Create Key</button>' +
          '</div>' +
        '</div>' +

        errorHtml +

        '<div class="goodos-api-keys-grid-v60">' +
          '<article class="goodos-api-keys-kpi-v60"><small>API Keys</small><strong>' + escapeHtml(total) + '</strong><span>Live key records</span></article>' +
          '<article class="goodos-api-keys-kpi-v60"><small>Active Keys</small><strong>' + escapeHtml(active) + '</strong><span>Currently usable keys</span></article>' +
          '<article class="goodos-api-keys-kpi-v60"><small>Restricted Keys</small><strong>' + escapeHtml(restricted) + '</strong><span>Scoped or limited keys</span></article>' +
          '<article class="goodos-api-keys-kpi-v60"><small>Scopes</small><strong>' + escapeHtml(scopes.size || 0) + '</strong><span>Detected permission groups</span></article>' +
        '</div>' +

        '<div class="goodos-api-keys-section-head-v60">' +
          '<h2>Key Registry</h2>' +
          '<span class="goodos-api-keys-pill-v60">Endpoint: ' + escapeHtml(result.endpoint || "none") + '</span>' +
        '</div>' +

        '<div class="goodos-api-keys-panel-v60">' +
          '<table class="goodos-api-keys-table-v60">' +
            '<thead><tr><th>Key</th><th>Status</th><th>Scope</th><th>Updated</th><th>Action</th></tr></thead>' +
            '<tbody>' + renderRows(keys) + '</tbody>' +
          '</table>' +
        '</div>' +
      '</section>';

    markApiKeysActive();
  }

  function run() {
    lockApiKeysRow();

    if (isApiKeysHash()) {
      renderApiKeysPage();
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", run);
  } else {
    run();
  }

  window.addEventListener("hashchange", function () {
    setTimeout(run, 20);
  });

  window.addEventListener("pageshow", run);

  setTimeout(run, 250);
  setTimeout(run, 900);
})();
</script>

</body>
</html>
