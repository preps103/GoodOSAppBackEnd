<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in with Goodbase</title><link rel="canonical" href="https://base.goodos.app/auth/ui"><style>html{color-scheme:dark}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07090f;color:#f6f7fb;font:16px system-ui}.card{width:min(420px,calc(100vw - 40px));padding:32px;border:1px solid #2b3040;border-radius:24px;background:#111520}h1{margin:12px 0 8px}p{color:#aab0c0}.field{display:grid;gap:8px;margin:18px 0}input,button{box-sizing:border-box;width:100%;padding:14px 16px;border-radius:12px;border:1px solid #343a4b;background:#0b0e15;color:inherit}button{cursor:pointer;background:#6d5dfc;border:0;font-weight:700}.providers{display:grid;gap:10px;margin-top:18px}.provider{background:#191e2b;border:1px solid #343a4b}.status{min-height:24px;color:#8ee6bd}.hidden{display:none}</style></head>
<body><main class="card"><div aria-hidden="true">◆</div><h1>Sign in with Goodbase</h1><p>Secure access for GoodOS applications.</p><form id="email-form"><label class="field">Email<input id="email" type="email" autocomplete="email" required></label><button type="submit">Send a one-time code</button></form><form id="code-form" class="hidden"><label class="field">One-time code<input id="code" inputmode="numeric" autocomplete="one-time-code" minlength="6" maxlength="6" required></label><button type="submit">Verify and sign in</button></form><div id="providers" class="providers" aria-label="Identity providers"></div><p id="status" class="status" role="status"></p></main><script src="/goodbase-auth.js" defer></script></body></html>
